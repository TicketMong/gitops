name: AWS Loadtest Run

on:
  workflow_dispatch:
    inputs:
      preset:
        description: Loadtest preset
        required: true
        type: choice
        default: aws-dev-smoke-1m
        options:
          - aws-dev-smoke-1m
          - mau10k-normal-peak
          - mau10k-ticket-open
          - stress-find-limit
      scenario:
        description: k6 scenario script
        required: true
        type: choice
        default: reservation-journey-load-test
        options:
          - reservation-journey-load-test
          - reservation-create-load-test
          - reservation-seat-contention-load-test
          - ticket-service-read-load-test
          - auth-login-load-test
          - read-api-baseline
      run_id:
        description: Optional run id suffix. Empty value uses current UTC timestamp.
        required: false
        type: string
        default: ""
      wait:
        description: Wait for the Kubernetes Job and print tail logs
        required: true
        type: boolean
        default: true
      timeout_seconds:
        description: Job wait timeout in seconds
        required: true
        type: string
        default: "1200"
      dry_run:
        description: Render and validate the manifest without creating the Job
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: aws-loadtest-run
  cancel-in-progress: false

env:
  AWS_DEV_K8S_HOST: ${{ vars.AWS_DEV_K8S_HOST || '13.125.191.132' }}
  AWS_DEV_K8S_USER: ${{ vars.AWS_DEV_K8S_USER || 'ubuntu' }}
  VALUES_FILE: platform/loadtest/values/aws-dev.yaml
  LOADTEST_NAMESPACE: loadtest
  MANUAL_RELEASE: read-api-loadtest-manual

jobs:
  run:
    name: Dispatch Kubernetes loadtest Job
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Resolve loadtest manifest
        id: manifest
        shell: bash
        env:
          INPUT_PRESET: ${{ inputs.preset }}
          INPUT_SCENARIO: ${{ inputs.scenario }}
          INPUT_RUN_ID: ${{ inputs.run_id }}
        run: |
          set -euo pipefail

          preset="${INPUT_PRESET}"
          scenario="${INPUT_SCENARIO}"
          scenario_base="${scenario%-load-test}"
          scenario_values_file=""
          for candidate in \
            "platform/loadtest/values/presets/${scenario}/${preset}.yaml" \
            "platform/loadtest/values/presets/${scenario_base}/${preset}.yaml" \
            "platform/loadtest/values/presets/${preset}.yaml"; do
            if [ -f "${candidate}" ]; then
              scenario_values_file="${candidate}"
              break
            fi
          done
          if [ -z "${scenario_values_file}" ] && [ -f "platform/loadtest/values/scenarios/${scenario}.yaml" ]; then
            scenario_values_file="platform/loadtest/values/scenarios/${scenario}.yaml"
          fi
          if [ -z "${scenario_values_file}" ]; then
            printf 'No scenario values file for preset=%s scenario=%s\n' "${preset}" "${scenario}" >&2
            exit 2
          fi

          run_id="${INPUT_RUN_ID:-manual-$(date -u +%Y%m%d%H%M%S)}"
          run_id="$(printf '%s' "${run_id}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9-]/-/g; s/^-*//; s/-*$//; s/--*/-/g' \
            | cut -c1-28)"
          if [ -z "${run_id}" ]; then
            printf '%s\n' 'run_id did not contain any Kubernetes-safe characters.' >&2
            exit 2
          fi

          job_name="${MANUAL_RELEASE}-read-${run_id}"
          manifest_path="${RUNNER_TEMP}/aws-loadtest-${run_id}.yaml"
          helm template "${MANUAL_RELEASE}" platform/loadtest \
            --namespace "${LOADTEST_NAMESPACE}" \
            -f "${VALUES_FILE}" \
            -f "${scenario_values_file}" \
            --set-string fullnameOverride="${MANUAL_RELEASE}" \
            --set manualRuns.dataset.enabled=false \
            --set-string manualRuns.dataset.runId="" \
            --set manualRuns.read.enabled=true \
            --set-string manualRuns.read.runId="${run_id}" > "${manifest_path}"

          printf 'run_id=%s\n' "${run_id}" >> "${GITHUB_OUTPUT}"
          printf 'job_name=%s\n' "${job_name}" >> "${GITHUB_OUTPUT}"
          printf 'manifest_path=%s\n' "${manifest_path}" >> "${GITHUB_OUTPUT}"
          printf 'scenario_values_file=%s\n' "${scenario_values_file}" >> "${GITHUB_OUTPUT}"

      - name: Prepare SSH
        shell: bash
        env:
          SSH_PRIVATE_KEY: ${{ secrets.AWS_DEV_K8S_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${SSH_PRIVATE_KEY}" ]; then
            printf '%s\n' 'Missing repository secret: AWS_DEV_K8S_SSH_PRIVATE_KEY' >&2
            exit 2
          fi
          install -m 700 -d ~/.ssh
          printf '%s\n' "${SSH_PRIVATE_KEY}" > ~/.ssh/aws-dev-k8s-key
          chmod 600 ~/.ssh/aws-dev-k8s-key
          ssh-keyscan -H "${AWS_DEV_K8S_HOST}" >> ~/.ssh/known_hosts

      - name: Apply loadtest Job
        shell: bash
        env:
          JOB_NAME: ${{ steps.manifest.outputs.job_name }}
          MANIFEST_PATH: ${{ steps.manifest.outputs.manifest_path }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          remote="${AWS_DEV_K8S_USER}@${AWS_DEV_K8S_HOST}"
          remote_manifest="/tmp/${JOB_NAME}.yaml"
          scp -i ~/.ssh/aws-dev-k8s-key "${MANIFEST_PATH}" "${remote}:${remote_manifest}"
          if [ "${DRY_RUN}" = "true" ]; then
            ssh -i ~/.ssh/aws-dev-k8s-key "${remote}" "kubectl apply --dry-run=server -f '${remote_manifest}'"
            exit 0
          fi
          ssh -i ~/.ssh/aws-dev-k8s-key "${remote}" "kubectl apply -f '${remote_manifest}'"

      - name: Wait and print logs
        if: ${{ inputs.wait && !inputs.dry_run }}
        shell: bash
        env:
          JOB_NAME: ${{ steps.manifest.outputs.job_name }}
          TIMEOUT_SECONDS: ${{ inputs.timeout_seconds }}
        run: |
          set -euo pipefail
          remote="${AWS_DEV_K8S_USER}@${AWS_DEV_K8S_HOST}"
          ssh -i ~/.ssh/aws-dev-k8s-key "${remote}" \
            JOB_NAME="${JOB_NAME}" \
            NAMESPACE="${LOADTEST_NAMESPACE}" \
            TIMEOUT_SECONDS="${TIMEOUT_SECONDS}" \
            'bash -s' <<'SCRIPT'
          set -euo pipefail
          deadline=$(( $(date +%s) + TIMEOUT_SECONDS ))
          while true; do
            complete="$(kubectl -n "${NAMESPACE}" get job "${JOB_NAME}" -o jsonpath='{.status.succeeded}' 2>/dev/null || true)"
            failed="$(kubectl -n "${NAMESPACE}" get job "${JOB_NAME}" -o jsonpath='{.status.failed}' 2>/dev/null || true)"
            if [ "${failed:-0}" -ge 1 ]; then
              kubectl -n "${NAMESPACE}" logs "job/${JOB_NAME}" --tail=180 || true
              exit 1
            fi
            if [ "${complete:-0}" -ge 1 ]; then
              kubectl -n "${NAMESPACE}" logs "job/${JOB_NAME}" --tail=180 || true
              printf 'Loadtest Job completed job=%s\n' "${JOB_NAME}"
              exit 0
            fi
            if [ "$(date +%s)" -ge "${deadline}" ]; then
              kubectl -n "${NAMESPACE}" logs "job/${JOB_NAME}" --tail=180 || true
              printf 'Timed out waiting for job/%s.\n' "${JOB_NAME}" >&2
              exit 1
            fi
            sleep 3
          done
          SCRIPT

      - name: Summary
        shell: bash
        env:
          RUN_ID: ${{ steps.manifest.outputs.run_id }}
          JOB_NAME: ${{ steps.manifest.outputs.job_name }}
          SCENARIO_VALUES_FILE: ${{ steps.manifest.outputs.scenario_values_file }}
        run: |
          {
            printf '### AWS Loadtest Run\n\n'
            printf -- '- preset: `%s`\n' '${{ inputs.preset }}'
            printf -- '- scenario: `%s`\n' '${{ inputs.scenario }}'
            printf -- '- run id: `%s`\n' "${RUN_ID}"
            printf -- '- job: `%s`\n' "${JOB_NAME}"
            printf -- '- values: `%s`, `%s`\n' "${VALUES_FILE}" "${SCENARIO_VALUES_FILE}"
            printf -- '- load source: Kubernetes Job Pod in aws-dev\n'
          } >> "${GITHUB_STEP_SUMMARY}"
