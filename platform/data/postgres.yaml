apiVersion: v1
kind: Service
metadata:
  name: auth-db
  namespace: ticketing-auth
  labels:
    app.kubernetes.io/part-of: medikong
    app.kubernetes.io/name: auth-db
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: auth-db
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: auth-db
  namespace: ticketing-auth
  labels:
    app.kubernetes.io/part-of: medikong
    app.kubernetes.io/name: auth-db
spec:
  serviceName: auth-db
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: auth-db
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: medikong
        app.kubernetes.io/name: auth-db
    spec:
      containers:
        - name: postgres
          image: postgres:15
          args:
            - -c
            - shared_buffers=16MB
            - -c
            - effective_cache_size=64MB
            - -c
            - work_mem=1MB
            - -c
            - maintenance_work_mem=16MB
            - -c
            - max_connections=20
          ports:
            - name: postgres
              containerPort: 5432
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - user
                - -d
                - auth_db
            initialDelaySeconds: 5
            periodSeconds: 5
          env:
            - name: POSTGRES_USER
              value: user
            - name: POSTGRES_PASSWORD
              value: password
            - name: POSTGRES_DB
              value: auth_db
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              memory: 192Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
