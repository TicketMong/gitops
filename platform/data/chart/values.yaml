profile: local

postgresql:
  image: postgres:15
  pgData: /var/lib/postgresql/data/pgdata
  user: user
  password: password
  exporter:
    enabled: true
    image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
    port: 9187
    serviceMonitor:
      enabled: true
      labels:
        release: kube-prometheus-stack
      interval: 30s
      path: /metrics
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        memory: 128Mi
  config:
    sharedBuffers: 128MB
    effectiveCacheSize: 512MB
    workMem: 8MB
    maintenanceWorkMem: 128MB
    maxConnections: 200
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
  storage: 1Gi
  databases: {}

mongodb:
  image: mongo:7
  name: notification-db
  namespace: ticketing-notification
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
  storage: 1Gi
