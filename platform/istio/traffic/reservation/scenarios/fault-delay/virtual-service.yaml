apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: reservation-service
  namespace: ticketing-reservation
  labels:
    app.kubernetes.io/name: reservation-service
    app.kubernetes.io/part-of: medikong
    medikong.io/traffic-policy: fault-delay
spec:
  hosts:
    - reservation-service
    - reservation-service.ticketing-reservation.svc.cluster.local
  gateways:
    - mesh
  http:
    - name: reservation-fault-delay
      fault:
        delay:
          fixedDelay: 3s
          percentage:
            value: 100
      timeout: 2s
      retries:
        attempts: 2
        perTryTimeout: 1s
        retryOn: 5xx,connect-failure,refused-stream
      route:
        - destination:
            host: reservation-service.ticketing-reservation.svc.cluster.local
            subset: v1
          weight: 100
