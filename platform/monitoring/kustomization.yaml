apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring
resources:
  - manifests/namespace.yaml
  - manifests/grafana-ingress.yaml
  - manifests/istio-mesh-podmonitors.yaml
  - manifests/prometheusrules/system-kubernetes-alerts.yaml
generatorOptions:
  disableNameSuffixHash: true
  labels:
    app.kubernetes.io/name: grafana-dashboard
    app.kubernetes.io/part-of: medikong-platform
    grafana_dashboard: "1"
configMapGenerator:
  - name: medikong-service-metrics-dashboards
    files:
      - dashboards/00-service-metrics-overview.json
      - dashboards/01-service-runtime-health.json
      - dashboards/02-service-runtime-detail.json
      - dashboards/10-system-kubernetes-overview.json
      - dashboards/11-pod-container-resources.json
      - dashboards/12-node-pressure-overview.json
      - dashboards/payment-service-metrics.json
  - name: medikong-logs-dashboards
    files:
      - dashboards/logs-10-overview.json
      - dashboards/logs-20-services.json
      - dashboards/logs-30-service-errors.json
      - dashboards/logs-40-drilldown.json
      - dashboards/logs-50-synthetic.json
      - dashboards/logs-60-business-flow.json
      - dashboards/logs-70-platform.json
