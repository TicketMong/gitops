apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring
resources:
  - manifests/namespace.yaml
  - manifests/istio-mesh-podmonitors.yaml
generatorOptions:
  disableNameSuffixHash: true
  labels:
    app.kubernetes.io/name: grafana-dashboard
    app.kubernetes.io/part-of: medikong-platform
    grafana_dashboard: "1"
configMapGenerator:
  - name: medikong-service-metrics-dashboards
    files:
      - dashboards/00-service-metrics-overview.json
      - dashboards/payment-service-metrics.json
