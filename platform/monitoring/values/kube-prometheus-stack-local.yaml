crds:
  enabled: true

alertmanager:
  enabled: true
  alertmanagerSpec:
    replicas: 1
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi

defaultRules:
  create: true

grafana:
  enabled: true
  grafana.ini:
    server:
      root_url: http://localhost/grafana/
      serve_from_sub_path: true
  adminUser: admin
  adminPassword: prom-local
  grafana.ini:
    server:
      root_url: http://localhost/grafana/
      serve_from_sub_path: true
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: monitoring
      provider:
        allowUiUpdates: false
        disableDelete: false
        foldersFromFilesStructure: true
  additionalDataSources:
    - name: Tempo
      uid: tempo
      type: tempo
      access: proxy
      url: http://tempo.observability.svc.cluster.local:3200
      isDefault: false
      jsonData:
        httpMethod: GET
        serviceMap:
          datasourceUid: prometheus
        tracesToLogsV2:
          datasourceUid: loki
          spanStartTimeShift: "-5m"
          spanEndTimeShift: "5m"
          filterByTraceID: true
          filterBySpanID: false
          tags:
            - key: service.name
              value: service_name
            - key: deployment.environment
              value: deployment_environment
    - name: Loki
      uid: loki
      type: loki
      access: proxy
      url: http://loki.observability.svc.cluster.local:3100
      isDefault: false
      jsonData:
        maxLines: 1000
        derivedFields:
          - name: trace_id
            matcherRegex: '"trace_id"\s*:\s*"([a-fA-F0-9]{32})"'
            datasourceUid: tempo
            url: '$${__value.raw}'
  persistence:
    enabled: false
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 300m
      memory: 768Mi

prometheus:
  prometheusSpec:
    replicas: 1
    retention: 6h
    serviceMonitorSelector:
      matchLabels:
        release: kube-prometheus-stack
    serviceMonitorNamespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: In
          values:
            - monitoring
            - observability
            - ticketing-auth
            - ticketing-concert
            - ticketing-notification
            - ticketing-payment
            - ticketing-reservation
            - ticketing-ticket
    podMonitorSelector:
      matchLabels:
        release: kube-prometheus-stack
    podMonitorNamespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: In
          values:
            - monitoring
            - observability
            - ticketing-auth
            - ticketing-concert
            - ticketing-notification
            - ticketing-payment
            - ticketing-reservation
            - ticketing-ticket
    ruleSelector:
      matchLabels:
        release: kube-prometheus-stack
    ruleNamespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: In
          values:
            - monitoring
            - ticketing-auth
            - ticketing-concert
            - ticketing-notification
            - ticketing-payment
            - ticketing-reservation
            - ticketing-ticket
    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        cpu: 300m
        memory: 768Mi

kube-state-metrics:
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

prometheus-node-exporter:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi
