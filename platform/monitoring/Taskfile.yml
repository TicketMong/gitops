version: "3"

vars:
  HELM: '{{default "helm" .HELM}}'
  KUBECTL: '{{default "kubectl" .KUBECTL}}'
  GITOPS_ROOT: '{{default "../.." .GITOPS_ROOT}}'
  MONITORING_NAMESPACE: '{{default "monitoring" .MONITORING_NAMESPACE}}'
  MONITORING_RELEASE: '{{default "kube-prometheus-stack" .MONITORING_RELEASE}}'
  MONITORING_CHART: '{{default "prometheus-community/kube-prometheus-stack" .MONITORING_CHART}}'
  MONITORING_CHART_REPO: '{{default "https://prometheus-community.github.io/helm-charts" .MONITORING_CHART_REPO}}'
  MONITORING_CHART_REPO_NAME: '{{default "prometheus-community" .MONITORING_CHART_REPO_NAME}}'
  MONITORING_CHART_VERSION: '{{default "86.1.0" .MONITORING_CHART_VERSION}}'
  MONITORING_PRIVATE_DEV_VALUES: '{{default "platform/monitoring/values/kube-prometheus-stack-private-dev.yaml" .MONITORING_PRIVATE_DEV_VALUES}}'
  MONITORING_LOCAL_VALUES: '{{default "platform/monitoring/values/kube-prometheus-stack-local.yaml" .MONITORING_LOCAL_VALUES}}'

tasks:
  repo:
    cmds:
      - '{{.HELM}} repo add {{.MONITORING_CHART_REPO_NAME}} {{.MONITORING_CHART_REPO}} --force-update >/dev/null'
      - '{{.HELM}} repo update {{.MONITORING_CHART_REPO_NAME}} >/dev/null'

  render:
    desc: kube-prometheus-stack private-dev/local values와 monitoring Kustomize 리소스를 렌더링합니다.
    cmds:
      - task repo
      - '{{.KUBECTL}} kustomize {{.GITOPS_ROOT}}/platform/monitoring >/dev/null'
      - '{{.HELM}} template {{.MONITORING_RELEASE}} {{.MONITORING_CHART}} --version {{.MONITORING_CHART_VERSION}} --namespace {{.MONITORING_NAMESPACE}} --include-crds -f {{.GITOPS_ROOT}}/{{.MONITORING_PRIVATE_DEV_VALUES}} >/dev/null'
      - '{{.HELM}} template {{.MONITORING_RELEASE}} {{.MONITORING_CHART}} --version {{.MONITORING_CHART_VERSION}} --namespace {{.MONITORING_NAMESPACE}} --include-crds -f {{.GITOPS_ROOT}}/{{.MONITORING_LOCAL_VALUES}} >/dev/null'

  up:
    desc: Docker Desktop dev에 Prometheus 기본 스택을 배포합니다.
    cmds:
      - task render
      - '{{.KUBECTL}} delete configmap medikong-service-metrics-dashboards medikong-app-dashboards medikong-infra-dashboards --namespace {{.MONITORING_NAMESPACE}} --ignore-not-found'
      - '{{.KUBECTL}} apply -k {{.GITOPS_ROOT}}/platform/monitoring'
      - '{{.HELM}} upgrade --install {{.MONITORING_RELEASE}} {{.MONITORING_CHART}} --version {{.MONITORING_CHART_VERSION}} --namespace {{.MONITORING_NAMESPACE}} --create-namespace -f {{.GITOPS_ROOT}}/{{.MONITORING_LOCAL_VALUES}} --wait --timeout=600s'

  status:
    desc: Prometheus stack과 scrape 확인용 리소스 상태를 표시합니다.
    cmds:
      - '{{.KUBECTL}} get daemonset,deploy,statefulset,pod,svc -n {{.MONITORING_NAMESPACE}}'
      - '{{.KUBECTL}} get prometheus,alertmanager -n {{.MONITORING_NAMESPACE}}'
      - '{{.KUBECTL}} get crd servicemonitors.monitoring.coreos.com podmonitors.monitoring.coreos.com prometheusrules.monitoring.coreos.com'
      - '{{.KUBECTL}} get servicemonitor --all-namespaces -l release={{.MONITORING_RELEASE}}'

  down:
    desc: Docker Desktop dev Prometheus stack을 정리합니다.
    cmds:
      - '{{.HELM}} uninstall {{.MONITORING_RELEASE}} --namespace {{.MONITORING_NAMESPACE}} --ignore-not-found'
