apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: istiod
  namespace: monitoring
  labels:
    app.kubernetes.io/name: istiod
    app.kubernetes.io/part-of: medikong-platform
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - istio-system
  selector:
    matchLabels:
      app: istiod
  podMetricsEndpoints:
    - port: http-monitoring
      path: /metrics
      interval: 30s
---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: ticketing-envoy-sidecars
  namespace: monitoring
  labels:
    app.kubernetes.io/name: ticketing-envoy-sidecars
    app.kubernetes.io/part-of: medikong-platform
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - ticketing-concert
      - ticketing-reservation
      - ticketing-payment
      - ticketing-ticket
      - ticketing-notification
  selector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - concert-service
          - reservation-service
          - payment-service
          - ticket-service
          - notification-service
  podMetricsEndpoints:
    - port: http-envoy-prom
      path: /stats/prometheus
      interval: 30s
      relabelings:
        - action: keep
          sourceLabels:
            - __meta_kubernetes_pod_container_name
          regex: istio-proxy
