  LOADTEST_RESERVATION_JOURNEY_TICKET_LIST_LIMIT: {{ .Values.scenarios.reservationJourney.ticketListLimit | quote }}
  LOADTEST_RESERVATION_JOURNEY_TICKET_LIST_MAX_PAGES: {{ .Values.scenarios.reservationJourney.ticketListMaxPages | quote }}
  LOADTEST_RESERVATION_JOURNEY_ACTIVE_CUSTOMER_COUNT: {{ .Values.scenarios.reservationJourney.activeCustomerCount | quote }}
  LOADTEST_RESERVATION_JOURNEY_PAYMENT_AMOUNT: {{ .Values.scenarios.reservationJourney.paymentAmount | quote }}
  LOADTEST_RESERVATION_JOURNEY_MAX_SEAT_ATTEMPTS: {{ .Values.scenarios.reservationJourney.maxSeatAttempts | quote }}
  LOADTEST_RESERVATION_JOURNEY_CONCERT_LIMIT: {{ .Values.scenarios.reservationJourney.concertLimit | quote }}
  LOADTEST_RESERVATION_JOURNEY_PERFORMANCE_LIMIT: {{ .Values.scenarios.reservationJourney.performanceLimit | quote }}
  LOADTEST_RESERVATION_JOURNEY_SEAT_LIMIT: {{ .Values.scenarios.reservationJourney.seatLimit | quote }}
  LOADTEST_RESERVATION_JOURNEY_THRESHOLD_HTTP_REQ_FAILED_RATE: {{ .Values.scenarios.reservationJourney.thresholds.httpReqFailedRate | quote }}
  LOADTEST_RESERVATION_JOURNEY_THRESHOLD_HTTP_REQ_DURATION_P95_MS: {{ .Values.scenarios.reservationJourney.thresholds.httpReqDurationP95Ms | quote }}
  LOADTEST_RESERVATION_JOURNEY_THRESHOLD_HTTP_REQ_DURATION_P99_MS: {{ .Values.scenarios.reservationJourney.thresholds.httpReqDurationP99Ms | quote }}
  LOADTEST_RESERVATION_JOURNEY_THRESHOLD_CHECKS_RATE: {{ .Values.scenarios.reservationJourney.thresholds.checksRate | quote }}
  LOADTEST_RESERVATION_JOURNEY_THRESHOLD_SUCCESS_RATE: {{ .Values.scenarios.reservationJourney.thresholds.successRate | quote }}
  LOADTEST_RESERVATION_JOURNEY_THRESHOLD_CONFLICT_RATE: {{ .Values.scenarios.reservationJourney.thresholds.conflictRate | quote }}
  LOADTEST_RESERVATION_JOURNEY_THRESHOLD_TICKET_ISSUED_RATE: {{ .Values.scenarios.reservationJourney.thresholds.ticketIssuedRate | quote }}
  LOADTEST_CUSTOMER_POOL_SIZE: {{ .Values.dataset.customerPool.size | quote }}
  LOADTEST_CUSTOMER_POOL_EMAIL_PREFIX: {{ .Values.dataset.customerPool.emailPrefix | quote }}
  LOADTEST_CUSTOMER_POOL_EMAIL_DOMAIN: {{ .Values.dataset.customerPool.emailDomain | quote }}
  LOADTEST_CUSTOMER_POOL_PASSWORD: {{ .Values.dataset.customerPool.password | quote }}
  LOADTEST_CUSTOMER_POOL_REVISION: {{ default .Values.dataset.revision .Values.dataset.customerPool.revision | quote }}
  LOADTEST_CUSTOMER_POOL_DISPLAY_NAME_PREFIX: {{ .Values.dataset.customerPool.displayNamePrefix | quote }}
  LOADTEST_CUSTOMER_POOL_PAD_WIDTH: {{ .Values.dataset.customerPool.padWidth | quote }}
  LOADTEST_DATASET_PROFILE: {{ .Values.dataset.profile | quote }}
  LOADTEST_DATASET_REVISION: {{ .Values.dataset.revision | quote }}
  LOADTEST_DATASET_TITLE_PREFIX: {{ .Values.dataset.titlePrefix | quote }}
  LOADTEST_DATASET_VENUE_PREFIX: {{ .Values.dataset.venuePrefix | quote }}
  LOADTEST_DATASET_CONCERTS: {{ .Values.dataset.concerts | quote }}
  LOADTEST_DATASET_PERFORMANCES_PER_CONCERT: {{ .Values.dataset.performancesPerConcert | quote }}
  LOADTEST_DATASET_SEAT_SECTIONS: {{ .Values.dataset.seatSections | quote }}
  LOADTEST_DATASET_SEAT_ROWS: {{ .Values.dataset.seatRows | quote }}
