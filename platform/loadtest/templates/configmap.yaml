apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "read-api-loadtest.fullname" . | quote }}
  namespace: {{ include "read-api-loadtest.namespace" . | quote }}
  labels:
{{ include "read-api-loadtest.labels" . | indent 4 }}
data:
  LOADTEST_TEST_TYPE: {{ required "loadtest.testType is required" .Values.loadtest.testType | quote }}
  LOADTEST_SCENARIO: {{ required "loadtest.scenario is required" .Values.loadtest.scenario | quote }}
  LOADTEST_ENVIRONMENT: {{ required "environment is required" .Values.environment | quote }}
  LOADTEST_TARGET: {{ required "loadtest.target is required" .Values.loadtest.target | quote }}
  LOADTEST_BASE_URL: {{ required "loadtest.baseUrl is required" .Values.loadtest.baseUrl | quote }}
  LOADTEST_LOCAL_BASE_URL: {{ .Values.loadtest.localBaseUrl | quote }}
  LOADTEST_AWS_BASE_URL: {{ .Values.loadtest.awsBaseUrl | quote }}
  LOADTEST_REVISION: {{ default .Values.image.tag .Values.loadtest.revision | quote }}
  LOADTEST_IMAGE: {{ include "read-api-loadtest.image" . | quote }}
  LOADTEST_IMAGE_TAG: {{ .Values.image.tag | quote }}
  LOADTEST_RELEASE: {{ .Release.Name | quote }}
  LOADTEST_NAMESPACE: {{ include "read-api-loadtest.namespace" . | quote }}
  LOADTEST_TRAFFIC_MODEL_PRESET: {{ .Values.trafficModel.preset | quote }}
  LOADTEST_TRAFFIC_MODEL_MAU: {{ .Values.trafficModel.mau | quote }}
  LOADTEST_TRAFFIC_MODEL_STICKINESS: {{ .Values.trafficModel.stickiness | quote }}
  LOADTEST_TRAFFIC_MODEL_PEAK_PARTICIPATION_RATE: {{ .Values.trafficModel.peakParticipationRate | quote }}
  LOADTEST_TRAFFIC_MODEL_PEAK_WINDOW_MINUTES: {{ .Values.trafficModel.peakWindowMinutes | quote }}
  LOADTEST_TRAFFIC_MODEL_JOURNEYS_PER_USER: {{ .Values.trafficModel.journeysPerUser | quote }}
  LOADTEST_TRAFFIC_MODEL_SAFETY_FACTOR: {{ .Values.trafficModel.safetyFactor | quote }}
  LOADTEST_TRAFFIC_MODEL_TARGET_TICKETS_PER_CUSTOMER: {{ .Values.trafficModel.targetTicketsPerCustomer | quote }}
  LOADTEST_TRAFFIC_MODEL_CALCULATED_JOURNEY_RATE: {{ .Values.trafficModel.calculatedJourneyRate | quote }}
  LOADTEST_TRAFFIC_MODEL_EXPECTED_JOURNEYS: {{ .Values.trafficModel.expectedJourneys | quote }}
  LOADTEST_DATASET_REQUEST_PREFIX: {{ .Values.dataset.requestPrefix | quote }}
  LOADTEST_DATASET_TIMEOUT_SECONDS: {{ .Values.dataset.timeoutSeconds | quote }}
  LOADTEST_DATASET_THRESHOLD_HTTP_REQ_FAILED_RATE: {{ .Values.dataset.thresholds.httpReqFailedRate | quote }}
  LOADTEST_DATASET_THRESHOLD_HTTP_REQ_DURATION_P95_MS: {{ .Values.dataset.thresholds.httpReqDurationP95Ms | quote }}
  LOADTEST_DATASET_THRESHOLD_HTTP_REQ_DURATION_P99_MS: {{ .Values.dataset.thresholds.httpReqDurationP99Ms | quote }}
  LOADTEST_DATASET_THRESHOLD_CHECKS_RATE: {{ .Values.dataset.thresholds.checksRate | quote }}
  LOADTEST_READ_API_REQUEST_PREFIX: {{ .Values.scenarios.readApiBaseline.requestPrefix | quote }}
  LOADTEST_READ_API_TIMEOUT_SECONDS: {{ .Values.scenarios.readApiBaseline.timeoutSeconds | quote }}
  LOADTEST_READ_API_VUS: {{ .Values.scenarios.readApiBaseline.vus | quote }}
  LOADTEST_READ_API_DURATION: {{ .Values.scenarios.readApiBaseline.duration | quote }}
  LOADTEST_READ_API_STAGES: {{ toJson .Values.scenarios.readApiBaseline.stages | quote }}
  LOADTEST_READ_API_GRACEFUL_STOP: {{ .Values.scenarios.readApiBaseline.gracefulStop | quote }}
  LOADTEST_READ_API_THINK_TIME_SECONDS: {{ .Values.scenarios.readApiBaseline.thinkTimeSeconds | quote }}
  LOADTEST_READ_API_CONCERT_LIMIT: {{ .Values.scenarios.readApiBaseline.concertLimit | quote }}
  LOADTEST_READ_API_PERFORMANCE_LIMIT: {{ .Values.scenarios.readApiBaseline.performanceLimit | quote }}
  LOADTEST_READ_API_SEAT_LIMIT: {{ .Values.scenarios.readApiBaseline.seatLimit | quote }}
  LOADTEST_READ_API_THRESHOLD_HTTP_REQ_FAILED_RATE: {{ .Values.scenarios.readApiBaseline.thresholds.httpReqFailedRate | quote }}
  LOADTEST_READ_API_THRESHOLD_HTTP_REQ_DURATION_P95_MS: {{ .Values.scenarios.readApiBaseline.thresholds.httpReqDurationP95Ms | quote }}
  LOADTEST_READ_API_THRESHOLD_HTTP_REQ_DURATION_P99_MS: {{ .Values.scenarios.readApiBaseline.thresholds.httpReqDurationP99Ms | quote }}
  LOADTEST_READ_API_THRESHOLD_CHECKS_RATE: {{ .Values.scenarios.readApiBaseline.thresholds.checksRate | quote }}
  LOADTEST_RESERVATION_JOURNEY_REQUEST_PREFIX: {{ .Values.scenarios.reservationJourney.requestPrefix | quote }}
  LOADTEST_RESERVATION_JOURNEY_TIMEOUT_SECONDS: {{ .Values.scenarios.reservationJourney.timeoutSeconds | quote }}
