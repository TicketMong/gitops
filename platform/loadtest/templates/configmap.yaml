  LOADTEST_RESERVATION_JOURNEY_DURATION: {{ .Values.scenarios.reservationJourney.duration | quote }}
  LOADTEST_RESERVATION_JOURNEY_STAGES: {{ toJson .Values.scenarios.reservationJourney.stages | quote }}
  LOADTEST_RESERVATION_JOURNEY_GRACEFUL_STOP: {{ .Values.scenarios.reservationJourney.gracefulStop | quote }}
  LOADTEST_RESERVATION_JOURNEY_THINK_TIME_SECONDS: {{ .Values.scenarios.reservationJourney.thinkTimeSeconds | quote }}
  LOADTEST_RESERVATION_JOURNEY_POLL_SECONDS: {{ .Values.scenarios.reservationJourney.pollSeconds | quote }}
