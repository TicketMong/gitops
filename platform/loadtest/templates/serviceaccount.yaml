{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "read-api-loadtest.serviceAccountName" . | quote }}
  namespace: {{ include "read-api-loadtest.namespace" . | quote }}
  labels:
{{ include "read-api-loadtest.labels" . | indent 4 }}
{{- with .Values.image.pullSecrets }}
imagePullSecrets:
{{- range . }}
  - name: {{ . | quote }}
{{- end }}
{{- end }}
{{- end }}
{{- if and .Values.serviceAccount.create (or .Values.scaleOutReport.rbac.create .Values.scenarios.capacityBaseline.resourceObservation.rbac.create (and .Values.collectorGuard.enabled .Values.collectorGuard.rbac.create)) }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ printf "%s-scale-out-reader" (include "read-api-loadtest.fullname" .) | quote }}
  labels:
{{ include "read-api-loadtest.labels" . | indent 4 }}
rules:
{{- if .Values.collectorGuard.enabled }}
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - get
      - list
{{- end }}
  - apiGroups:
      - autoscaling
    resources:
      - horizontalpodautoscalers
    verbs:
      - get
  - apiGroups:
      - apps
    resources:
      - deployments
    verbs:
      - get
  - apiGroups:
      - metrics.k8s.io
    resources:
      - pods
    verbs:
      - get
      - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ printf "%s-scale-out-reader" (include "read-api-loadtest.fullname" .) | quote }}
  labels:
{{ include "read-api-loadtest.labels" . | indent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ printf "%s-scale-out-reader" (include "read-api-loadtest.fullname" .) | quote }}
subjects:
  - kind: ServiceAccount
    name: {{ include "read-api-loadtest.serviceAccountName" . | quote }}
    namespace: {{ include "read-api-loadtest.namespace" . | quote }}
{{- end }}
