{{- if .Values.cronJob.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "read-api-loadtest.fullname" . | quote }}
  namespace: {{ include "read-api-loadtest.namespace" . | quote }}
  labels:
{{ include "read-api-loadtest.labels" . | indent 4 }}
spec:
  suspend: {{ .Values.cronJob.suspend }}
  schedule: {{ .Values.cronJob.schedule | quote }}
  concurrencyPolicy: {{ .Values.cronJob.concurrencyPolicy | quote }}
  successfulJobsHistoryLimit: {{ .Values.cronJob.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.cronJob.failedJobsHistoryLimit }}
  jobTemplate:
    spec:
      activeDeadlineSeconds: {{ .Values.cronJob.activeDeadlineSeconds }}
      backoffLimit: {{ .Values.cronJob.backoffLimit }}
      ttlSecondsAfterFinished: {{ .Values.cronJob.ttlSecondsAfterFinished }}
      template:
        metadata:
          labels:
{{ include "read-api-loadtest.labelsForScenario" (dict "root" . "scenario" .Values.loadtest.scenario) | indent 12 }}
            app.kubernetes.io/component: k6-runner
        spec:
{{ include "read-api-loadtest.podSpec" (dict "root" . "scenario" .Values.loadtest.scenario) | indent 10 }}
{{- end }}
