{{- if .Values.dataset.cronJob.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ printf "%s-dataset" (include "read-api-loadtest.fullname" .) | trunc 63 | trimSuffix "-" | quote }}
  namespace: {{ include "read-api-loadtest.namespace" . | quote }}
  labels:
{{ include "read-api-loadtest.labelsForScenario" (dict "root" . "scenario" .Values.dataset.scenario) | indent 4 }}
spec:
  suspend: {{ .Values.dataset.cronJob.suspend }}
  schedule: {{ .Values.dataset.cronJob.schedule | quote }}
  concurrencyPolicy: {{ .Values.dataset.cronJob.concurrencyPolicy | quote }}
  successfulJobsHistoryLimit: {{ .Values.dataset.cronJob.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.dataset.cronJob.failedJobsHistoryLimit }}
  jobTemplate:
    spec:
      activeDeadlineSeconds: {{ .Values.dataset.cronJob.activeDeadlineSeconds }}
      backoffLimit: {{ .Values.dataset.cronJob.backoffLimit }}
      ttlSecondsAfterFinished: {{ .Values.dataset.cronJob.ttlSecondsAfterFinished }}
      template:
        metadata:
          labels:
{{ include "read-api-loadtest.labelsForScenario" (dict "root" . "scenario" .Values.dataset.scenario) | indent 12 }}
            app.kubernetes.io/component: k6-runner
            medikong.io/phase: dataset-setup
        spec:
{{ include "read-api-loadtest.podSpec" (dict "root" . "scenario" .Values.dataset.scenario "credentialsSecretName" .Values.dataset.credentialsSecretName) | indent 10 }}
{{- end }}
