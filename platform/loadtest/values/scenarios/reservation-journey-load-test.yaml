loadtest:
  scenario: reservation-journey-load-test

dataset:
  profile: reservation-journey
  revision: reservation-v1
  customerPool:
    revision: reservation-v1

scenarios:
  reservationJourney:
    requestPrefix: loadtest-reservation
    executor: ramping-arrival-rate
    vus: 50
    rate: 5
    timeUnit: 1s
    preAllocatedVUs: 50
    maxVUs: 200
    duration: 6m
    stages:
      - duration: 1m
        target: 5
      - duration: 2m
        target: 10
      - duration: 3m
        target: 20
    thinkTimeSeconds: 0
    thresholds:
      httpReqFailedRate: "0.01"
      httpReqDurationP95Ms: "1000"
      httpReqDurationP99Ms: "2000"
      checksRate: "0.99"
      successRate: "0.99"
      conflictRate: "0.05"
      ticketIssuedRate: "0.99"
