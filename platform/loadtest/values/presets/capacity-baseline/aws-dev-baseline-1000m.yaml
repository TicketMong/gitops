loadtest:
  scenario: capacity-baseline-load-test
  credentialsSecretName: read-api-loadtest-credentials

trafficModel:
  preset: aws-dev-baseline-1000m

dataset:
  scenario: setup-capacity-baseline-dataset
  profile: capacity-baseline
  revision: capacity-baseline-half-year-early-growth-v2
  concerts: 270
  performancesPerConcert: 3
  seatSections: 1
  seatRows: 20
  seatsPerRow: 35
  customerPool:
    size: 100000
    emailPrefix: capacity-customer
    emailDomain: loadtest.medikong.local
    password: loadtest1234
    revision: capacity-baseline-half-year-early-growth-v2

manualRuns:
  dataset:
    activeDeadlineSeconds: 7200
  read:
    activeDeadlineSeconds: 5400

reportArchive:
  enabled: true
  storageClassName: medikong-aws-gp3
  size: 5Gi

collectorGuard:
  enabled: true

resources:
  requests:
    cpu: 1000m
    memory: 2Gi
  limits:
    cpu: "4"
    memory: 6Gi

scenarios:
  capacityBaseline:
    requestPrefix: loadtest-capacity-baseline
    timeoutSeconds: 10
    setupTimeout: 10m
    preAllocatedVUs: 600
    maxVUs: 1500
    serviceSteps:
      - auth
      - concert
      - reservation
      - payment
      - ticket
      - notification
    stages:
      - duration: 90s
        target: 20
      - duration: 90s
        target: 40
      - duration: 90s
        target: 60
      - duration: 90s
        target: 80
      - duration: 90s
        target: 100
    serviceStages:
      auth:
        - duration: 90s
          target: 10
        - duration: 90s
          target: 30
        - duration: 90s
          target: 40
      payment:
        - duration: 90s
          target: 5
        - duration: 90s
          target: 10
        - duration: 90s
          target: 20
        - duration: 90s
          target: 30
        - duration: 90s
          target: 40
    gracefulStop: 15s
    activeCustomerCount: 500
    concertLimit: 20
    performanceLimit: 20
    seatLimit: 200
    calendarYearMonth: "2026-07"
    performanceDate: "2026-07-01"
    ticketListLimit: 20
    paymentAmount: 50000
    reservationHistoryCount: 261000
    reservationPaidCount: 170000
    reservationCanceledCount: 45500
    paymentPoolCount: 184000
    paymentHistoryCount: 184000
    paymentApprovedCount: 170000
    ticketIssuePoolCount: 170000
    ticketHistoryCount: 170000
    ticketsPerCustomer: 30
    notificationCount: 354000
    notificationsPerCustomer: 30
    targetUtilization: "0.70"
    seedMethod: deterministic_bulk_insert
    fixedConditions:
      environment: aws-dev
      hpa: "disabled"
      replicas: "1"
      cpuRequest: 1000m
      cpuLimit: none
      authTokenTtlSeconds: "7200"
      dbProfile: aws-dev
    seedRowCounts:
      customer_count: 100000
      provider_count: 1
      admin_count: 1
      concert_count: 270
      performance_count: 810
      seat_count: 567000
      seat_grade_count: 3240
      reservation_history_count: 261000
      payment_pool_count: 184000
      payment_count: 184000
      payment_event_count: 184000
      ticket_issue_pool_count: 170000
      ticket_count: 170000
      notification_count: 354000
    endpointSloP95Ms:
      capacity_baseline.auth.login: 300
      capacity_baseline.concert.recommended: 80
      capacity_baseline.concert.detail: 80
      capacity_baseline.concert.calendar: 80
      capacity_baseline.concert.date_performances: 80
      capacity_baseline.concert.seat_map: 150
      capacity_baseline.reservation.create: 120
      capacity_baseline.payment.create: 120
      capacity_baseline.ticket.issue: 120
      capacity_baseline.ticket.list: 100
      capacity_baseline.notification.list: 80
    resourceObservation:
      enabled: true
      source: metrics-api
      prometheusUrl: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
      queryWindow: 1m
      pollEveryIterations: 5
      rbac:
        create: true
    thresholds:
      httpReqFailedRate: "0.01"
      httpReqDurationP95Ms: "150"
      httpReqDurationP99Ms: "300"
      checksRate: "0.99"
