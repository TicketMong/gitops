loadtest:
  scenario: capacity-baseline-load-test
  credentialsSecretName: read-api-loadtest-credentials

trafficModel:
  preset: aws-dev-baseline-1000m

dataset:
  scenario: setup-capacity-baseline-dataset
  profile: capacity-baseline
  revision: capacity-baseline-aws-dev-v1
  concerts: 16
  performancesPerConcert: 4
  seatSections: 1
  seatRows: 20
  seatsPerRow: 50
  customerPool:
    size: 1000
    emailPrefix: capacity-customer
    emailDomain: loadtest.medikong.local
    password: loadtest1234
    revision: capacity-baseline-aws-dev-v1

manualRuns:
  dataset:
    activeDeadlineSeconds: 3600
  read:
    activeDeadlineSeconds: 5400

reportArchive:
  enabled: true
  storageClassName: medikong-aws-gp3
  size: 5Gi

collectorGuard:
  enabled: true

resources:
  requests:
    cpu: 1000m
    memory: 2Gi
  limits:
    cpu: "4"
    memory: 6Gi

scenarios:
  capacityBaseline:
    requestPrefix: loadtest-capacity-baseline
    timeoutSeconds: 10
    setupTimeout: 10m
    preAllocatedVUs: 600
    maxVUs: 1500
    serviceSteps:
      - auth
      - concert
      - reservation
      - payment
      - ticket
      - notification
    stages:
      - duration: 90s
        target: 20
      - duration: 90s
        target: 40
      - duration: 90s
        target: 60
      - duration: 90s
        target: 80
      - duration: 90s
        target: 100
    serviceStages:
      auth:
        - duration: 90s
          target: 10
        - duration: 90s
          target: 20
        - duration: 90s
          target: 40
        - duration: 90s
          target: 60
        - duration: 90s
          target: 80
      payment:
        - duration: 90s
          target: 5
        - duration: 90s
          target: 10
        - duration: 90s
          target: 20
        - duration: 90s
          target: 30
        - duration: 90s
          target: 40
    gracefulStop: 15s
    activeCustomerCount: 500
    concertLimit: 20
    performanceLimit: 20
    seatLimit: 200
    ticketListLimit: 20
    paymentAmount: 50000
    paymentPoolCount: 48000
    ticketsPerCustomer: 30
    notificationsPerCustomer: 30
    targetUtilization: "0.70"
    seedMethod: deterministic_bulk_insert
    fixedConditions:
      environment: aws-dev
      hpa: "disabled"
      replicas: "1"
      cpuRequest: 1000m
      cpuLimit: none
      authTokenTtlSeconds: "7200"
      dbProfile: aws-dev
    seedRowCounts:
      customer_count: 1000
      provider_count: 1
      admin_count: 1
      concert_count: 16
      performance_count: 64
      seat_count: 64000
      payment_pool_count: 48000
      ticket_count: 30000
      notification_count: 30000
    resourceObservation:
      enabled: true
      source: metrics-api
      prometheusUrl: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
      queryWindow: 1m
      pollEveryIterations: 5
      rbac:
        create: true
    thresholds:
      httpReqFailedRate: "0.01"
      httpReqDurationP95Ms: "100"
      httpReqDurationP99Ms: "300"
      checksRate: "0.99"
