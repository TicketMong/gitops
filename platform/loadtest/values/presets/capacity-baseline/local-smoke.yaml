loadtest:
  scenario: capacity-baseline-load-test
  credentialsSecretName: read-api-loadtest-credentials

trafficModel:
  preset: local-smoke

dataset:
  scenario: setup-capacity-baseline-dataset
  profile: capacity-baseline
  revision: capacity-baseline-v1
  concerts: 4
  performancesPerConcert: 2
  seatSections: 1
  seatRows: 5
  seatsPerRow: 30
  customerPool:
    size: 60
    emailPrefix: capacity-customer
    emailDomain: loadtest.medikong.local
    password: loadtest1234
    revision: capacity-baseline-v1

manualRuns:
  dataset:
    activeDeadlineSeconds: 1200
  read:
    activeDeadlineSeconds: 1200

reportArchive:
  enabled: true
  size: 1Gi

scenarios:
  capacityBaseline:
    requestPrefix: loadtest-capacity-baseline
    timeoutSeconds: 10
    setupTimeout: 5m
    preAllocatedVUs: 10
    maxVUs: 30
    serviceSteps:
      - auth
      - concert
      - reservation
      - payment
      - ticket
      - notification
    stages:
      - duration: 15s
        target: 1
      - duration: 15s
        target: 2
    gracefulStop: 5s
    activeCustomerCount: 20
    concertLimit: 10
    performanceLimit: 10
    seatLimit: 100
    ticketListLimit: 20
    paymentAmount: 50000
    paymentPoolCount: 1200
    ticketsPerCustomer: 20
    notificationsPerCustomer: 20
    targetUtilization: "0.70"
    seedMethod: deterministic_bulk_insert
    fixedConditions:
      hpa: "disabled"
      replicas: "1"
      cpuRequest: 1000m
      cpuLimit: none
      authTokenTtlSeconds: "7200"
    seedRowCounts:
      customer_count: 60
      provider_count: 1
      admin_count: 1
      concert_count: 4
      performance_count: 8
      seat_count: 1200
      payment_pool_count: 1200
      ticket_count: 1200
      notification_count: 1200
    resourceObservation:
      enabled: true
      source: metrics-api
      prometheusUrl: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
      queryWindow: 1m
      pollEveryIterations: 5
      rbac:
        create: true
    thresholds:
      httpReqFailedRate: "0.01"
      httpReqDurationP95Ms: "100"
      httpReqDurationP99Ms: "300"
      checksRate: "0.99"
