loadtest:
  scenario: reservation-journey-load-test
  credentialsSecretName: read-api-loadtest-credentials

trafficModel:
  preset: aws-dev-hpa-journey-r10-r50
  mau: ""
  stickiness: ""
  peakParticipationRate: ""
  peakWindowMinutes: 29
  journeysPerUser: 1
  safetyFactor: ""
  targetTicketsPerCustomer: 100
  calculatedJourneyRate: 50
  expectedJourneys: 38340

manualRuns:
  read:
    activeDeadlineSeconds: 2700
    ttlSecondsAfterFinished: 86400

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 1Gi

scaleOutReport:
  pollEveryIterations: 50

dataset:
  profile: reservation-journey
  revision: reservation-hpa-journey-r10-r50-v1
  concerts: 80
  performancesPerConcert: 3
  customerPool:
    size: 500
    revision: reservation-hpa-journey-r10-r50-v1

scenarios:
  reservationJourney:
    requestPrefix: loadtest-reservation-hpa-journey-r10-r50
    executor: ramping-arrival-rate
    rate: 2
    timeUnit: 1s
    preAllocatedVUs: 250
    maxVUs: 800
    duration: 29m
    stages:
      - duration: 2m
        target: 2
      - duration: 2m
        target: 5
      - duration: 3m
        target: 10
      - duration: 3m
        target: 20
      - duration: 3m
        target: 30
      - duration: 4m
        target: 40
      - duration: 4m
        target: 50
      - duration: 3m
        target: 25
      - duration: 5m
        target: 2
    thinkTimeSeconds: 0
    ticketListLimit: 20
    ticketListMaxPages: 5
    activeCustomerCount: 500
    maxSeatAttempts: 3
    concertLimit: 400
    performanceLimit: 400
    seatLimit: 300
    thresholds:
      httpReqFailedRate: "0.03"
      httpReqDurationP95Ms: "2000"
      httpReqDurationP99Ms: "5000"
      checksRate: "0.97"
      successRate: "0.97"
      conflictRate: "0.15"
      ticketIssuedRate: "0.97"
