environment: local

image:
  registry: localhost:5001
  repository: read-api-loadtest
  tag: dev
  pullPolicy: Always
  pullSecrets: []

cronJob:
  suspend: true
  schedule: "0 */6 * * *"

dataset:
  concerts: 20
  performancesPerConcert: 2
  seatSections: 1
  seatRows: 10
  seatsPerRow: 30
  cronJob:
    suspend: true
    schedule: "5 */6 * * *"

syncJobs:
  dataset:
    enabled: false
  read:
    enabled: false

loadtest:
  target: local
  baseUrl: http://kong-kong-proxy.kong.svc.cluster.local
  localBaseUrl: http://kong-kong-proxy.kong.svc.cluster.local
  awsBaseUrl: http://kong-kong-proxy.kong.svc.cluster.local
  vus: 5
  duration: 2m
  thresholds:
    httpReqFailedRate: "0.01"
    httpReqDurationP95Ms: "500"
    httpReqDurationP99Ms: "1000"
    checksRate: "0.99"
