environment: local

nameOverride: ""
fullnameOverride: ""

namespace:
  create: true
  name: loadtest

image:
  registry: localhost:5001
  repository: read-api-loadtest
  tag: dev
  pullPolicy: Always
  pullSecrets: []

serviceAccount:
  create: true
  name: read-api-loadtest-runner

dataset:
  scenario: setup-read-dataset
  credentialsSecretName: read-api-loadtest-credentials
  profile: read-api-basic
  revision: v1
  titlePrefix: Medikong Loadtest
  venuePrefix: Loadtest Hall
  concerts: 20
  performancesPerConcert: 2
  seatSections: 1
  seatRows: 10
  seatsPerRow: 30
  lookaheadDays: 14
  startsAtSpacingMinutes: 180
  discoveryLimit: 200
  createPauseSeconds: 0
  customerPool:
    size: 100
    emailPrefix: loadtest
    emailDomain: loadtest.medikong.local
    password: loadtest1234
    revision: ""
    displayNamePrefix: Loadtest Customer
    padWidth: 6
  timeoutSeconds: 15
  requestPrefix: loadtest-dataset
  thresholds:
    httpReqFailedRate: "0.01"
    httpReqDurationP95Ms: "3000"
    httpReqDurationP99Ms: "5000"
    checksRate: "0.99"
syncJobs:
  dataset:
    enabled: false
    hook: PostSync
    hookWeight: "0"
    activeDeadlineSeconds: 1800
    backoffLimit: 0
    ttlSecondsAfterFinished: 86400
  read:
    enabled: false
    hook: PostSync
    hookWeight: "10"
    activeDeadlineSeconds: 900
    backoffLimit: 0
    ttlSecondsAfterFinished: 86400

manualRuns:
  dataset:
    enabled: false
    runId: ""
    hook: Sync
    hookWeight: "0"
    hookDeletePolicy: BeforeHookCreation
    activeDeadlineSeconds: 1800
    backoffLimit: 0
    ttlSecondsAfterFinished: 86400
  read:
    enabled: false
    runId: ""
    hook: Sync
    hookWeight: "10"
    hookDeletePolicy: BeforeHookCreation
    activeDeadlineSeconds: 900
    backoffLimit: 0
    ttlSecondsAfterFinished: 86400

reportArchive:
  enabled: false
  existingClaim: ""
  storageClassName: ""
  size: 2Gi
  accessModes:
    - ReadWriteOnce
  mountPath: /loadtest/reports

collectorGuard:
  enabled: false
  namespace: observability
  labelSelector: app.kubernetes.io/name=opentelemetry-collector
  timeoutSeconds: 60
  pollIntervalSeconds: 5
  rbac:
    create: true

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: "1"
    memory: 512Mi

loadtest:
  testType: loadtest
  scenario: read-api-baseline
  credentialsSecretName: ""
  target: local
  revision: ""
  baseUrl: http://kong-kong-proxy.kong.svc.cluster.local
  localBaseUrl: http://kong-kong-proxy.kong.svc.cluster.local
  awsBaseUrl: http://kong-kong-proxy.kong.svc.cluster.local

trafficModel:
  preset: ""
  mau: ""
  stickiness: ""
  peakParticipationRate: ""
  peakWindowMinutes: ""
  journeysPerUser: ""
  safetyFactor: ""
  targetTicketsPerCustomer: ""
  calculatedJourneyRate: ""
  expectedJourneys: ""

scaleOutReport:
  enabled: false
  pollEveryIterations: 10
  targets: []
  rbac:
    create: false

scenarios:
  readApiBaseline:
    requestPrefix: loadtest-read
    timeoutSeconds: 10
    vus: 5
    duration: 2m
    stages:
      - duration: 1m
        target: 1
      - duration: 1m
        target: 3
      - duration: 1m
        target: 5
    gracefulStop: 30s
    thinkTimeSeconds: 0
    concertLimit: 50
    performanceLimit: 50
    seatLimit: 200
    thresholds:
      httpReqFailedRate: "0.01"
      httpReqDurationP95Ms: "500"
      httpReqDurationP99Ms: "1000"
      checksRate: "0.99"
  authLogin:
    requestPrefix: loadtest-auth-login
    timeoutSeconds: 10
    setupTimeout: 10m
    executor: ramping-vus
    vus: 5
    rate: 1
    timeUnit: 1s
    preAllocatedVUs: 10
    maxVUs: 20
    duration: 2m
    stages:
      - duration: 1m
        target: 1
      - duration: 1m
        target: 3
      - duration: 1m
        target: 5
    gracefulStop: 30s
    thinkTimeSeconds: 0
    thresholds:
      httpReqFailedRate: "0.01"
      httpReqDurationP95Ms: "500"
      httpReqDurationP99Ms: "1000"
      checksRate: "0.99"
      successRate: "0.99"
  ticketServiceRead:
    requestPrefix: loadtest-ticket-read
    timeoutSeconds: 10
    setupTimeout: 10m
    executor: constant-arrival-rate
    vus: 5
    rate: 1
    timeUnit: 1s
    preAllocatedVUs: 10
    maxVUs: 20
    duration: 2m
    stages: []
    gracefulStop: 30s
    thinkTimeSeconds: 0
    ticketListLimit: 20
    ticketListPaginationPages: 3
    ticketListMaxPages: 5
    ticketsPerCustomer: 60
    waitTargetTicketPosition: 41
    activeCustomerCount: 20
    thresholds:
      httpReqFailedRate: "0.01"
      httpReqDurationP95Ms: "500"
      httpReqDurationP99Ms: "1000"
      checksRate: "0.99"
      successRate: "0.99"
  reservationJourney:
    requestPrefix: loadtest-reservation
    timeoutSeconds: 10
    executor: ramping-vus
    vus: 5
    rate: 1
    timeUnit: 1s
    preAllocatedVUs: 10
    maxVUs: 20
    duration: 2m
    stages:
      - duration: 1m
        target: 1
      - duration: 1m
        target: 3
      - duration: 1m
        target: 5
    gracefulStop: 30s
    thinkTimeSeconds: 0
    pollSeconds: 45
    pollIntervalSeconds: 2
    ticketListLimit: 20
    ticketListMaxPages: 5
    activeCustomerCount: 100
    paymentAmount: 50000
    maxSeatAttempts: 3
    concertLimit: 50
    performanceLimit: 50
    seatLimit: 200
    thresholds:
      httpReqFailedRate: "0.01"
      httpReqDurationP95Ms: "500"
      httpReqDurationP99Ms: "1000"
      checksRate: "0.99"
      successRate: "0.99"
      conflictRate: "0.05"
      ticketIssuedRate: "0.99"
  reservationCreate:
    requestPrefix: loadtest-reservation-create
    timeoutSeconds: 10
    setupTimeout: 10m
    executor: ramping-vus
    vus: 5
    rate: 1
    timeUnit: 1s
    preAllocatedVUs: 10
    maxVUs: 20
    duration: 2m
    stages:
      - duration: 1m
        target: 1
      - duration: 1m
        target: 3
      - duration: 1m
        target: 5
    gracefulStop: 30s
    thinkTimeSeconds: 0
    activeCustomerCount: 100
    maxSeatAttempts: 3
    concertLimit: 50
    performanceLimit: 50
    seatLimit: 200
    seatCandidateCount: 200
    thresholds:
      httpReqFailedRate: "0.01"
      httpReqDurationP95Ms: "500"
      httpReqDurationP99Ms: "1000"
      checksRate: "0.99"
      handledRate: "0.99"
      createdRate: "0.99"
      infraFailureRate: "0.01"
  reservationSeatContention:
    requestPrefix: loadtest-reservation-contention
    timeoutSeconds: 10
    setupTimeout: 10m
    executor: ramping-arrival-rate
    vus: 5
    rate: 1
    timeUnit: 1s
    preAllocatedVUs: 10
    maxVUs: 20
    duration: 2m
    stages:
      - duration: 30s
        target: 1
      - duration: 30s
        target: 3
      - duration: 1m
        target: 5
    gracefulStop: 30s
    thinkTimeSeconds: 0
    activeCustomerCount: 100
    maxSeatAttempts: 1
    concertLimit: 10
    performanceLimit: 10
    seatLimit: 50
    seatCandidateCount: 5
    thresholds:
      httpReqFailedRate: "0.05"
      httpReqDurationP95Ms: "750"
      httpReqDurationP99Ms: "1500"
      checksRate: "0.95"
      handledRate: "0.95"
      createdRate: "0.0001"
      infraFailureRate: "0.01"
  capacityBaseline:
    requestPrefix: loadtest-capacity-baseline
    timeoutSeconds: 10
    setupTimeout: 5m
    vus: 5
    rate: 1
    timeUnit: 1s
    preAllocatedVUs: 10
    maxVUs: 20
    duration: 1m
    serviceSteps:
      - auth
      - concert
      - reservation
      - payment
      - ticket
      - notification
    stages:
      - duration: 20s
        target: 1
      - duration: 20s
        target: 2
    serviceStages: {}
    gracefulStop: 10s
    thinkTimeSeconds: 0
    activeCustomerCount: 20
    concertLimit: 20
    performanceLimit: 20
    seatLimit: 100
    ticketListLimit: 20
    paymentAmount: 50000
    paymentPoolCount: 8000
    ticketsPerCustomer: 20
    notificationsPerCustomer: 20
    targetUtilization: "0.70"
    seedMethod: deterministic_bulk_insert
    fixedConditions:
      hpa: "disabled"
      replicas: "1"
      cpuRequest: 500m
      cpuLimit: none
      authTokenTtlSeconds: "7200"
    schemaRevisions:
      auth-service: model-v1
      concert-service: model-v1
      reservation-service: model-v1
      payment-service: model-v1
      ticket-service: model-v1
      notification-service: model-v1
    seedRowCounts:
      customer_count: 120
      provider_count: 1
      admin_count: 1
      concert_count: 8
      performance_count: 16
      seat_count: 8000
      payment_pool_count: 8000
      ticket_count: 2400
      notification_count: 2400
    resourceObservation:
      enabled: false
      source: prometheus
      prometheusUrl: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
      queryWindow: 1m
      pollEveryIterations: 10
      rbac:
        create: false
      targets:
        - service: auth-service
          namespace: ticketing-auth
          podSelector: app.kubernetes.io/name=auth-service
          podRegex: auth-service-.*
        - service: concert-service
          namespace: ticketing-concert
          podSelector: app.kubernetes.io/name=concert-service
          podRegex: concert-service-.*
        - service: reservation-service
          namespace: ticketing-reservation
          podSelector: app.kubernetes.io/name=reservation-service
          podRegex: reservation-service-.*
        - service: payment-service
          namespace: ticketing-payment
          podSelector: app.kubernetes.io/name=payment-service
          podRegex: payment-service-.*
        - service: ticket-service
          namespace: ticketing-ticket
          podSelector: app.kubernetes.io/name=ticket-service
          podRegex: ticket-service-.*
        - service: notification-service
          namespace: ticketing-notification
          podSelector: app.kubernetes.io/name=notification-service
          podRegex: notification-service-.*
    database:
      authUrl: postgresql+psycopg://user:password@auth-db.ticketing-auth.svc.cluster.local:5432/auth_db
      concertUrl: postgresql+psycopg://user:password@concert-db.ticketing-concert.svc.cluster.local:5432/concert_db
      reservationUrl: postgresql+psycopg://user:password@reservation-db.ticketing-reservation.svc.cluster.local:5432/reservation_db
      paymentUrl: postgresql+psycopg://user:password@payment-db.ticketing-payment.svc.cluster.local:5432/payment_db
      ticketUrl: postgresql+psycopg://user:password@ticket-db.ticketing-ticket.svc.cluster.local:5432/ticket_db
      mongodbUrl: mongodb://notification-db.ticketing-notification.svc.cluster.local:27017
      mongodbDbName: notification_db
    thresholds:
      httpReqFailedRate: "0.01"
      httpReqDurationP95Ms: "100"
      httpReqDurationP99Ms: "300"
      checksRate: "0.99"

k6:
  output: ""
  extraArgs: []

extraEnv: []
