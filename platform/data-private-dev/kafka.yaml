apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: ticketing-messaging
  labels:
    app.kubernetes.io/part-of: medikong
    app.kubernetes.io/name: kafka
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: kafka
  ports:
    - name: plaintext
      port: 9092
      targetPort: plaintext
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-headless
  namespace: ticketing-messaging
  labels:
    app.kubernetes.io/part-of: medikong
    app.kubernetes.io/name: kafka
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: kafka
  ports:
    - name: plaintext
      port: 9092
      targetPort: plaintext
    - name: controller
      port: 9093
      targetPort: controller
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: ticketing-messaging
  labels:
    app.kubernetes.io/part-of: medikong
    app.kubernetes.io/name: kafka
spec:
  serviceName: kafka-headless
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kafka
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: medikong
        app.kubernetes.io/name: kafka
    spec:
      nodeSelector:
        medikong.io/workload: data
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: prepare-kafka-storage
          image: public.ecr.aws/docker/library/busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - mkdir -p /var/lib/kafka/data/kafka-logs && chown -R 1000:1000 /var/lib/kafka/data && chmod -R 0775 /var/lib/kafka/data
          volumeMounts:
            - name: data
              mountPath: /var/lib/kafka/data
      containers:
        - name: kafka
          image: apache/kafka:3.8.1
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          ports:
            - name: plaintext
              containerPort: 9092
            - name: controller
              containerPort: 9093
          env:
            - name: CLUSTER_ID
              value: MkU3OEVBNTcwNTJENDM2Qk
            - name: KAFKA_NODE_ID
              value: "1"
            - name: KAFKA_PROCESS_ROLES
              value: broker,controller
            - name: KAFKA_LISTENERS
              value: PLAINTEXT://:9092,CONTROLLER://:9093
            - name: KAFKA_ADVERTISED_LISTENERS
              value: PLAINTEXT://kafka.ticketing-messaging.svc.cluster.local:9092
            - name: KAFKA_HEAP_OPTS
              value: -Xms256m -Xmx512m
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: CONTROLLER
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: 1@kafka-0.kafka-headless.ticketing-messaging.svc.cluster.local:9093
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: PLAINTEXT
            - name: KAFKA_LOG_DIRS
              value: /var/lib/kafka/data/kafka-logs
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"
            - name: KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS
              value: "0"
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "true"
          readinessProbe:
            tcpSocket:
              port: plaintext
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: plaintext
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /var/lib/kafka/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        storageClassName: medikong-local-path
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 2Gi
---
apiVersion: batch/v1
kind: Job
metadata:
  name: kafka-create-topics
  namespace: ticketing-messaging
  labels:
    app.kubernetes.io/part-of: medikong
    app.kubernetes.io/name: kafka-create-topics
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: medikong
        app.kubernetes.io/name: kafka-create-topics
    spec:
      nodeSelector:
        medikong.io/workload: data
      restartPolicy: OnFailure
      containers:
        - name: kafka-create-topics
          image: apache/kafka:3.8.1
          command:
            - /bin/bash
            - -ec
            - |
              until /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list >/dev/null 2>&1; do
                echo "waiting for kafka..."
                sleep 5
              done

              /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic reservation-created --partitions 1 --replication-factor 1
              /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic reservation-expired --partitions 1 --replication-factor 1
              /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic payment-approved --partitions 1 --replication-factor 1
              /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic payment-failed --partitions 1 --replication-factor 1
              /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic ticket-issued --partitions 1 --replication-factor 1
              /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list
