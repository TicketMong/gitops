apiVersion: v1
kind: Service
metadata:
  name: notification-db
  namespace: ticketing-notification
  labels:
    app.kubernetes.io/part-of: medikong
    app.kubernetes.io/name: notification-db
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: notification-db
  ports:
    - name: mongo
      port: 27017
      targetPort: mongo
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: notification-db
  namespace: ticketing-notification
  labels:
    app.kubernetes.io/part-of: medikong
    app.kubernetes.io/name: notification-db
spec:
  serviceName: notification-db
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: notification-db
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: medikong
        app.kubernetes.io/name: notification-db
    spec:
      nodeSelector:
        medikong.io/workload: data
      containers:
        - name: mongo
          image: mongo:7
          ports:
            - name: mongo
              containerPort: 27017
          readinessProbe:
            tcpSocket:
              port: mongo
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 384Mi
          volumeMounts:
            - name: data
              mountPath: /data/db
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        storageClassName: medikong-local-path
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
