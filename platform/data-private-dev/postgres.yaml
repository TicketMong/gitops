apiVersion: v1
kind: Service
metadata:
  name: auth-db
  namespace: ticketing-auth
  labels:
    app.kubernetes.io/part-of: medikong
    app.kubernetes.io/name: auth-db
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: auth-db
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: auth-db
  namespace: ticketing-auth
  labels:
    app.kubernetes.io/part-of: medikong
    app.kubernetes.io/name: auth-db
spec:
  serviceName: auth-db
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: auth-db
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: medikong
        app.kubernetes.io/name: auth-db
    spec:
      nodeSelector:
        medikong.io/workload: data
      containers:
        - name: postgres
          image: postgres:15
          args:
            - -c
            - max_connections=30
          ports:
            - name: postgres
              containerPort: 5432
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - user
                - -d
                - auth_db
            initialDelaySeconds: 5
            periodSeconds: 5
          env:
            - name: POSTGRES_USER
              value: user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-auth-credentials
                  key: password
            - name: POSTGRES_DB
              value: auth_db
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        storageClassName: medikong-local-path
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
