apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "synthetic-traffic.fullname" . | quote }}
  namespace: {{ include "synthetic-traffic.namespace" . | quote }}
  labels:
{{ include "synthetic-traffic.labels" . | indent 4 }}
data:
  SYNTHETIC_SCENARIO: {{ required "synthetic.scenario is required" .Values.synthetic.scenario | quote }}
  SYNTHETIC_TARGET: {{ required "synthetic.target is required" .Values.synthetic.target | quote }}
  SYNTHETIC_BASE_URL: {{ required "synthetic.baseUrl is required" .Values.synthetic.baseUrl | quote }}
  SYNTHETIC_INTERNAL_BASE_URL: {{ .Values.synthetic.internalBaseUrl | quote }}
  SYNTHETIC_EXTERNAL_BASE_URL: {{ .Values.synthetic.externalBaseUrl | quote }}
  SYNTHETIC_TIMEOUT_SECONDS: {{ .Values.synthetic.timeoutSeconds | quote }}
  SYNTHETIC_POLL_SECONDS: {{ .Values.synthetic.pollSeconds | quote }}
  SYNTHETIC_POLL_INTERVAL_SECONDS: {{ .Values.synthetic.pollIntervalSeconds | quote }}
  SYNTHETIC_PAYMENT_AMOUNT: {{ .Values.synthetic.paymentAmount | quote }}
  SYNTHETIC_REQUEST_PREFIX: {{ .Values.synthetic.requestPrefix | quote }}
  SYNTHETIC_CONCERT_ID: {{ .Values.synthetic.concertId | quote }}
  SYNTHETIC_CONCERT_TITLE: {{ .Values.synthetic.concertTitle | quote }}
  SYNTHETIC_MAX_SEAT_ATTEMPTS: {{ .Values.synthetic.maxSeatAttempts | quote }}
  SYNTHETIC_FIXTURE_LOOKAHEAD_DAYS: {{ .Values.synthetic.fixtureLookaheadDays | quote }}
  SYNTHETIC_FIXTURE_SEAT_ROWS: {{ .Values.synthetic.fixtureSeatRows | quote }}
  SYNTHETIC_FIXTURE_SEATS_PER_ROW: {{ .Values.synthetic.fixtureSeatsPerRow | quote }}
