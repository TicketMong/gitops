apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "synthetic-traffic.fullname" . | quote }}
  namespace: {{ include "synthetic-traffic.namespace" . | quote }}
  labels:
{{ include "synthetic-traffic.labels" . | indent 4 }}
spec:
  schedule: {{ .Values.cronJob.schedule | quote }}
  concurrencyPolicy: {{ .Values.cronJob.concurrencyPolicy | quote }}
  successfulJobsHistoryLimit: {{ .Values.cronJob.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.cronJob.failedJobsHistoryLimit }}
  jobTemplate:
    spec:
      activeDeadlineSeconds: {{ .Values.cronJob.activeDeadlineSeconds }}
      backoffLimit: {{ .Values.cronJob.backoffLimit }}
      ttlSecondsAfterFinished: {{ .Values.cronJob.ttlSecondsAfterFinished }}
      template:
        metadata:
          labels:
{{ include "synthetic-traffic.labels" . | indent 12 }}
            app.kubernetes.io/component: k6-runner
        spec:
          serviceAccountName: {{ include "synthetic-traffic.serviceAccountName" . | quote }}
          restartPolicy: Never
{{- with .Values.image.pullSecrets }}
          imagePullSecrets:
{{- range . }}
            - name: {{ . | quote }}
{{- end }}
{{- end }}
          containers:
            - name: runner
              image: {{ include "synthetic-traffic.image" . | quote }}
              imagePullPolicy: {{ .Values.image.pullPolicy | quote }}
              command:
                - /bin/sh
                - -ec
              args:
                - exec k6 run --log-format=raw "/synthetic/scenarios/${SYNTHETIC_SCENARIO}.js"
              envFrom:
                - configMapRef:
                    name: {{ include "synthetic-traffic.fullname" . | quote }}
                - secretRef:
                    name: {{ required "synthetic.credentialsSecretName is required" .Values.synthetic.credentialsSecretName | quote }}
                    optional: false
              resources:
{{ toYaml .Values.resources | indent 16 }}
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
