environment: local

nameOverride: ""
fullnameOverride: ""

namespace:
  create: true
  name: synthetic

image:
  registry: localhost:5001
  repository: synthetic-traffic
  tag: dev
  pullPolicy: Always
  pullSecrets: []

serviceAccount:
  create: true
  name: synthetic-traffic-runner

cronJob:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 6
  failedJobsHistoryLimit: 12
  activeDeadlineSeconds: 240
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400

resources:
  requests:
    cpu: 25m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 256Mi

synthetic:
  scenario: external-journey
  target: external
  baseUrl: http://kong-kong-proxy.kong.svc.cluster.local
  internalBaseUrl: http://kong-kong-proxy.kong.svc.cluster.local
  externalBaseUrl: ""
  timeoutSeconds: 10
  pollSeconds: 45
  pollIntervalSeconds: 2
  paymentAmount: 50000
  requestPrefix: synthetic
  credentialsSecretName: synthetic-traffic-credentials
  concertId: ""
  concertTitle: Medikong Synthetic E2E
  maxSeatAttempts: 3
  fixtureLookaheadDays: 7
  fixtureSeatRows: 5
  fixtureSeatsPerRow: 20
