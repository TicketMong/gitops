version: "3"

vars:
  HELM: '{{default "helm" .HELM}}'
  KUBECTL: '{{default "kubectl" .KUBECTL}}'
  DOCKER: '{{default "docker" .DOCKER}}'
  TASK: '{{default "task" .TASK}}'
  RELEASE: '{{default "synthetic-traffic" .SYNTHETIC_RELEASE}}'
  NAMESPACE: '{{default "synthetic" .SYNTHETIC_NAMESPACE}}'
  IMAGE_REGISTRY: '{{default "localhost:5001" .DEV_REGISTRY}}'
  IMAGE_NAMESPACE: '{{default "" .DEV_IMAGE_NAMESPACE}}'
  IMAGE_REPOSITORY: '{{default "synthetic-traffic" .SYNTHETIC_IMAGE_REPOSITORY}}'
  IMAGE_TAG: '{{default "dev" .DEV_IMAGE_TAG}}'
  VALUES_FILE: '{{default "values/local.yaml" .SYNTHETIC_VALUES_FILE}}'
  CREDENTIALS_SECRET: '{{default "synthetic-traffic-credentials" .SYNTHETIC_CREDENTIALS_SECRET}}'

tasks:
  default:
    desc: Synthetic traffic task 목록을 표시합니다.
    cmds:
      - task --list

  render:
    desc: Synthetic traffic Helm chart를 렌더링합니다.
    cmds:
      - |
        set -eu
        values_file="${SYNTHETIC_VALUES_FILE:-{{.VALUES_FILE}}}"
        image_ref="$(task image-ref --silent)"
        image_registry="${image_ref%/*}"
        image_name_tag="${image_ref##*/}"
        image_repository="${image_name_tag%:*}"
        image_tag="${image_name_tag##*:}"
        {{.HELM}} template {{.RELEASE}} . \
          -f "${values_file}" \
          --namespace {{.NAMESPACE}} \
          --set-string image.registry="${image_registry}" \
          --set-string image.repository="${image_repository}" \
          --set-string image.tag="${image_tag}"

  image-ref:
    desc: Synthetic traffic runner image reference를 출력합니다.
    cmds:
      - |
        set -eu
        image_registry='{{.IMAGE_REGISTRY}}'
        image_namespace='{{.IMAGE_NAMESPACE}}'
        image_repository='{{.IMAGE_REPOSITORY}}'
        image_tag='{{.IMAGE_TAG}}'
        if [ -n "${image_namespace}" ]; then
          image_registry="${image_registry%/}/${image_namespace#/}"
        fi
        printf '%s/%s:%s\n' "${image_registry%/}" "${image_repository}" "${image_tag}"

  image-build:
    desc: Synthetic traffic runner image를 빌드합니다.
    cmds:
      - |
        set -eu
        image_ref="$(task image-ref --silent)"
        {{.DOCKER}} build -f runner/Dockerfile -t "${image_ref}" .

  image-push:
    desc: Synthetic traffic runner image를 registry에 push합니다.
    cmds:
      - task: image-build
      - |
        set -eu
        image_ref="$(task image-ref --silent)"
        {{.DOCKER}} push "${image_ref}"

  secret-local:
    desc: 로컬 synthetic credential Secret을 준비합니다.
    cmds:
      - |
        set -eu
        {{.KUBECTL}} create namespace {{.NAMESPACE}} --dry-run=client -o yaml | {{.KUBECTL}} apply -f -
        {{.KUBECTL}} -n {{.NAMESPACE}} create secret generic {{.CREDENTIALS_SECRET}} \
          --from-literal=SYNTHETIC_CUSTOMER_EMAIL="${SYNTHETIC_CUSTOMER_EMAIL:-customer@example.com}" \
          --from-literal=SYNTHETIC_CUSTOMER_PASSWORD="${SYNTHETIC_CUSTOMER_PASSWORD:-customer1234}" \
          --from-literal=SYNTHETIC_PROVIDER_EMAIL="${SYNTHETIC_PROVIDER_EMAIL:-provider@example.com}" \
          --from-literal=SYNTHETIC_PROVIDER_PASSWORD="${SYNTHETIC_PROVIDER_PASSWORD:-provider1234}" \
          --from-literal=SYNTHETIC_ADMIN_EMAIL="${SYNTHETIC_ADMIN_EMAIL:-admin@example.com}" \
          --from-literal=SYNTHETIC_ADMIN_PASSWORD="${SYNTHETIC_ADMIN_PASSWORD:-admin1234}" \
          --dry-run=client -o yaml | {{.KUBECTL}} apply -f -

  deploy:
    desc: Synthetic traffic runner image를 push하고 CronJob을 Helm으로 배포합니다.
    cmds:
      - task: image-push
      - task: render
      - |
        set -eu
        values_file="${SYNTHETIC_VALUES_FILE:-{{.VALUES_FILE}}}"
        image_ref="$(task image-ref --silent)"
        image_registry="${image_ref%/*}"
        image_name_tag="${image_ref##*/}"
        image_repository="${image_name_tag%:*}"
        image_tag="${image_name_tag##*:}"
        {{.HELM}} upgrade --install {{.RELEASE}} . \
          --namespace {{.NAMESPACE}} \
          --create-namespace \
          -f "${values_file}" \
          --set-string image.registry="${image_registry}" \
          --set-string image.repository="${image_repository}" \
          --set-string image.tag="${image_tag}"

  dev:
    desc: 로컬 runner image를 build/push하고 CronJob을 Kubernetes에 반영합니다.
    cmds:
      - task: secret-local
      - task: deploy
      - task: setup-fixture
      - task: status

  setup-fixture:
    internal: true
    desc: Synthetic full journey에 필요한 로컬 fixture를 준비합니다.
    cmds:
      - task: run-scenario
        vars:
          SCENARIO: setup-fixture
          TARGET: internal

  run-scenario:
    internal: true
    desc: 배포된 CronJob template에서 지정한 k6 scenario Job을 1회 실행합니다.
    vars:
      SCENARIO: '{{default "" .SCENARIO}}'
      TARGET: '{{default "" .TARGET}}'
    cmds:
      - |
        set -eu
        scenario='{{.SCENARIO}}'
        target='{{.TARGET}}'
        if [ -z "${scenario}" ]; then
          printf 'SCENARIO is required.\n' >&2
          exit 2
        fi
        job_name="{{.RELEASE}}-${scenario}-$(date -u +%Y%m%d%H%M%S)"
        {{.KUBECTL}} -n {{.NAMESPACE}} create job "${job_name}" \
          --from="cronjob/{{.RELEASE}}" \
          --dry-run=client -o yaml \
          | {{.KUBECTL}} -n {{.NAMESPACE}} set env --local -f - \
              SYNTHETIC_SCENARIO="${scenario}" \
              ${target:+SYNTHETIC_TARGET="${target}"} \
              -o yaml \
          | {{.KUBECTL}} apply -f -
        deadline=$(( $(date +%s) + 300 ))
        while true; do
          complete="$({{.KUBECTL}} -n {{.NAMESPACE}} get job "${job_name}" -o jsonpath='{.status.succeeded}' 2>/dev/null || true)"
          failed="$({{.KUBECTL}} -n {{.NAMESPACE}} get job "${job_name}" -o jsonpath='{.status.failed}' 2>/dev/null || true)"
          if [ "${complete:-0}" -ge 1 ]; then
            {{.KUBECTL}} -n {{.NAMESPACE}} logs "job/${job_name}" --tail=200
            exit 0
          fi
          if [ "${failed:-0}" -ge 1 ]; then
            {{.KUBECTL}} -n {{.NAMESPACE}} logs "job/${job_name}" --tail=200 || true
            exit 1
          fi
          if [ "$(date +%s)" -ge "${deadline}" ]; then
            {{.KUBECTL}} -n {{.NAMESPACE}} logs "job/${job_name}" --tail=200 || true
            printf 'Timed out waiting for job/%s.\n' "${job_name}" >&2
            exit 1
          fi
          sleep 2
        done

  run:
    desc: 배포된 CronJob에서 수동 Job을 1회 생성하고 로그를 출력합니다.
    cmds:
      - task: setup-fixture
      - |
        set -eu
        job_name="{{.RELEASE}}-manual-$(date -u +%Y%m%d%H%M%S)"
        {{.KUBECTL}} -n {{.NAMESPACE}} create job "${job_name}" --from="cronjob/{{.RELEASE}}"
        deadline=$(( $(date +%s) + 300 ))
        while true; do
          complete="$({{.KUBECTL}} -n {{.NAMESPACE}} get job "${job_name}" -o jsonpath='{.status.succeeded}' 2>/dev/null || true)"
          failed="$({{.KUBECTL}} -n {{.NAMESPACE}} get job "${job_name}" -o jsonpath='{.status.failed}' 2>/dev/null || true)"
          if [ "${complete:-0}" -ge 1 ]; then
            {{.KUBECTL}} -n {{.NAMESPACE}} logs "job/${job_name}" --tail=200
            exit 0
          fi
          if [ "${failed:-0}" -ge 1 ]; then
            {{.KUBECTL}} -n {{.NAMESPACE}} logs "job/${job_name}" --tail=200 || true
            exit 1
          fi
          if [ "$(date +%s)" -ge "${deadline}" ]; then
            {{.KUBECTL}} -n {{.NAMESPACE}} logs "job/${job_name}" --tail=200 || true
            printf 'Timed out waiting for job/%s.\n' "${job_name}" >&2
            exit 1
          fi
          sleep 2
        done

  logs:
    desc: 최근 synthetic runner 로그를 봅니다.
    cmds:
      - '{{.KUBECTL}} -n {{.NAMESPACE}} logs -l app.kubernetes.io/name=synthetic-traffic --tail=200 --prefix=true'

  status:
    desc: Synthetic traffic Helm release와 CronJob 상태를 봅니다.
    cmds:
      - '{{.HELM}} status {{.RELEASE}} --namespace {{.NAMESPACE}}'
      - '{{.KUBECTL}} -n {{.NAMESPACE}} get cronjob,job,pod -l app.kubernetes.io/name=synthetic-traffic'

  clean:
    desc: Synthetic traffic Helm release를 제거합니다.
    cmds:
      - '{{.HELM}} uninstall {{.RELEASE}} --namespace {{.NAMESPACE}} --ignore-not-found'

  down:
    desc: clean의 별칭입니다.
    cmds:
      - task: clean
