apiVersion: configuration.konghq.com/v1
kind: KongClusterPlugin
metadata:
  name: ticketing-identity-headers
  annotations:
    kubernetes.io/ingress.class: kong
  labels:
    app.kubernetes.io/part-of: medikong
plugin: pre-function
config:
  access:
    - |
      local gateway_headers = {
        "X-User-Id",
        "X-User-Email",
        "X-User-Role",
        "X-Token-Id",
        "X-Provider-Id"
      }

      for _, header in ipairs(gateway_headers) do
        kong.service.request.clear_header(header)
      end

      local auth = kong.request.get_header("authorization")
      if not auth then
        return
      end

      local token = auth:match("[Bb]earer%s+(.+)")
      if not token then
        return
      end

      local payload_b64 = token:match("^[^.]+%.([^.]+)%.")
      if not payload_b64 then
        return
      end

      payload_b64 = payload_b64:gsub("-", "+"):gsub("_", "/")
      local padding = #payload_b64 % 4
      if padding > 0 then
        payload_b64 = payload_b64 .. string.rep("=", 4 - padding)
      end

      local payload_json = ngx.decode_base64(payload_b64)
      if not payload_json then
        return
      end

      local function claim_value(key)
        local quoted = payload_json:match('"' .. key .. '"%s*:%s*"([^"]*)"')
        if quoted then
          return quoted
        end
        return payload_json:match('"' .. key .. '"%s*:%s*([%d%-]+)')
      end

      local sub = claim_value("sub")
      local email = claim_value("email")
      local role = claim_value("role")
      local token_id = claim_value("jti")
      local provider_id = claim_value("providerId") or claim_value("provider_id")

      if sub then
        kong.service.request.set_header("X-User-Id", tostring(sub))
      end
      if email then
        kong.service.request.set_header("X-User-Email", tostring(email))
      end
      if role then
        role = string.upper(tostring(role))
        kong.service.request.set_header("X-User-Role", role)
      end
      if token_id then
        kong.service.request.set_header("X-Token-Id", tostring(token_id))
      end
      if provider_id then
        kong.service.request.set_header("X-Provider-Id", tostring(provider_id))
      elseif role == "PROVIDER" and sub then
        kong.service.request.set_header("X-Provider-Id", tostring(sub))
      end
