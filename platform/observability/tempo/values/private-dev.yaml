imageMirror:
  images:
    - name: tempo
      description: Tempo trace backend
      source: docker.io/grafana/tempo:2.9.0
      targetRegistry: 941141115079.dkr.ecr.ap-northeast-2.amazonaws.com
      targetRepository: grafana/tempo
      tag: 2.9.0-amd64

replicas: 1

tempo:
  registry: 941141115079.dkr.ecr.ap-northeast-2.amazonaws.com
  repository: grafana/tempo
  tag: 2.9.0-amd64
  pullSecrets:
    - ecr-registry
  retention: 6h
  memBallastSizeMbs: 32
  reportingEnabled: false
  storage:
    trace:
      backend: local
      local:
        path: /var/tempo/traces
      wal:
        path: /var/tempo/wal
  resources:
    requests:
      cpu: 50m
      memory: 384Mi
    limits:
      cpu: 500m
      memory: 1Gi

persistence:
  enabled: true
  storageClassName: medikong-local-path
  size: 1Gi

nodeSelector:
  medikong.io/workload: observability

serviceMonitor:
  enabled: false
