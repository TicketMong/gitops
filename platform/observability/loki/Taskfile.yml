version: "3"

vars:
  HELM: '{{default "helm" .HELM}}'
  KUBECTL: '{{default "kubectl" .KUBECTL}}'
  GITOPS_ROOT: '{{default "../../.." .GITOPS_ROOT}}'
  OBSERVABILITY_NAMESPACE: '{{default "observability" .OBSERVABILITY_NAMESPACE}}'
  LOKI_RELEASE: '{{default "loki" .LOKI_RELEASE}}'
  LOKI_CHART: '{{default "grafana/loki" .LOKI_CHART}}'
  LOKI_CHART_REPO: '{{default "https://grafana.github.io/helm-charts" .LOKI_CHART_REPO}}'
  LOKI_CHART_REPO_NAME: '{{default "grafana" .LOKI_CHART_REPO_NAME}}'
  LOKI_CHART_VERSION: '{{default "6.55.0" .LOKI_CHART_VERSION}}'
  LOKI_VALUES: '{{default "platform/observability/loki/values/aws-dev.yaml" .LOKI_VALUES}}'
  LOKI_PRIVATE_DEV_VALUES: '{{default "platform/observability/loki/values/private-dev.yaml" .LOKI_PRIVATE_DEV_VALUES}}'
  LOKI_LOCAL_VALUES: '{{default "platform/observability/loki/values/local.yaml" .LOKI_LOCAL_VALUES}}'

tasks:
  repo:
    cmds:
      - '{{.HELM}} repo add {{.LOKI_CHART_REPO_NAME}} {{.LOKI_CHART_REPO}} --force-update >/dev/null'
      - '{{.HELM}} repo update {{.LOKI_CHART_REPO_NAME}} >/dev/null'

  render:
    desc: Loki aws-dev/private-dev/local Helm values를 렌더링합니다.
    cmds:
      - task repo
      - '{{.HELM}} template {{.LOKI_RELEASE}} {{.LOKI_CHART}} --version {{.LOKI_CHART_VERSION}} --namespace {{.OBSERVABILITY_NAMESPACE}} -f {{.GITOPS_ROOT}}/{{.LOKI_VALUES}} >/dev/null'
      - '{{.HELM}} template {{.LOKI_RELEASE}} {{.LOKI_CHART}} --version {{.LOKI_CHART_VERSION}} --namespace {{.OBSERVABILITY_NAMESPACE}} -f {{.GITOPS_ROOT}}/{{.LOKI_PRIVATE_DEV_VALUES}} >/dev/null'
      - '{{.HELM}} template {{.LOKI_RELEASE}} {{.LOKI_CHART}} --version {{.LOKI_CHART_VERSION}} --namespace {{.OBSERVABILITY_NAMESPACE}} -f {{.GITOPS_ROOT}}/{{.LOKI_LOCAL_VALUES}} >/dev/null'

  up:
    desc: Docker Desktop dev에 Loki log backend를 배포합니다.
    cmds:
      - task render
      - '{{.HELM}} upgrade --install {{.LOKI_RELEASE}} {{.LOKI_CHART}} --version {{.LOKI_CHART_VERSION}} --namespace {{.OBSERVABILITY_NAMESPACE}} --create-namespace -f {{.GITOPS_ROOT}}/{{.LOKI_LOCAL_VALUES}} --wait --timeout=300s'

  status:
    desc: Loki 리소스 상태를 표시합니다.
    cmds:
      - '{{.KUBECTL}} get pods,svc,statefulset,pvc -n {{.OBSERVABILITY_NAMESPACE}} -l app.kubernetes.io/name=loki'

  down:
    desc: Docker Desktop dev Loki release를 정리합니다.
    cmds:
      - '{{.HELM}} uninstall {{.LOKI_RELEASE}} --namespace {{.OBSERVABILITY_NAMESPACE}} --ignore-not-found'
