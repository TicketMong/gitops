deploymentMode: SingleBinary

chunksCache:
  enabled: false

resultsCache:
  enabled: false

loki:
  auth_enabled: false
  image:
    repository: grafana/loki
    tag: 3.6.7
  commonConfig:
    replication_factor: 1
  limits_config:
    retention_period: 24h
    allow_structured_metadata: true
    otlp_config:
      resource_attributes:
        ignore_defaults: true
        attributes_config:
          - action: index_label
            attributes:
              - k8s.namespace.name
              - k8s.pod.name
              - k8s.container.name
              - service.name
              - deployment.environment.name
              - app
              - environment
              - scenario
              - step
  compactor:
    compaction_interval: 10m
    retention_enabled: true
    delete_request_store: filesystem
    working_directory: /var/loki/compactor
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  storage:
    type: filesystem

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    size: 2Gi
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 300m
      memory: 512Mi

read:
  replicas: 0

write:
  replicas: 0

backend:
  replicas: 0

gateway:
  enabled: false

lokiCanary:
  enabled: false

test:
  enabled: false

monitoring:
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false
