mode: deployment
fullnameOverride: opentelemetry-collector

image:
  repository: 941141115079.dkr.ecr.ap-northeast-2.amazonaws.com/otel/opentelemetry-collector
  tag: 0.153.0
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: ecr-registry

command:
  name: otelcol

serviceAccount:
  create: true
  automountServiceAccountToken: false

replicaCount: 1

rollout:
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

ports:
  otlp:
    enabled: true
    containerPort: 4317
    servicePort: 4317
    protocol: TCP
    appProtocol: grpc
  otlp-http:
    enabled: true
    containerPort: 4318
    servicePort: 4318
    protocol: TCP
  jaeger-compact:
    enabled: false
  jaeger-thrift:
    enabled: false
  jaeger-grpc:
    enabled: false
  zipkin:
    enabled: false
  metrics:
    enabled: true
    containerPort: 8888
    servicePort: 8888
    protocol: TCP

alternateConfig:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318
  processors:
    memory_limiter:
      check_interval: 1s
      limit_percentage: 75
      spike_limit_percentage: 20
    batch:
      timeout: 5s
      send_batch_size: 8192
  exporters:
    otlp/tempo:
      endpoint: tempo.observability.svc.cluster.local:4317
      tls:
        insecure: true
  extensions:
    health_check:
      endpoint: 0.0.0.0:13133
  service:
    extensions:
      - health_check
    telemetry:
      metrics:
        readers:
          - pull:
              exporter:
                prometheus:
                  host: 0.0.0.0
                  port: 8888
    pipelines:
      traces:
        receivers:
          - otlp
        processors:
          - memory_limiter
          - batch
        exporters:
          - otlp/tempo

serviceMonitor:
  enabled: true
  metricsEndpoints:
    - port: metrics
      path: /metrics
      interval: 30s
  extraLabels:
    release: kube-prometheus-stack

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 512Mi

nodeSelector:
  workload.medical-platform.io/tier: platform

podLabels:
  app.kubernetes.io/part-of: medikong
  app.kubernetes.io/component: trace-collector

extraManifests:
  - apiVersion: networking.k8s.io/v1
    kind: NetworkPolicy
    metadata:
      name: opentelemetry-collector-trace-pipeline
      namespace: observability
      labels:
        app.kubernetes.io/name: opentelemetry-collector
        app.kubernetes.io/part-of: medikong
        app.kubernetes.io/component: trace-collector
    spec:
      podSelector:
        matchLabels:
          app.kubernetes.io/name: opentelemetry-collector
      policyTypes:
        - Ingress
        - Egress
      ingress:
        - from:
            - namespaceSelector:
                matchLabels:
                  app.kubernetes.io/part-of: medikong
              podSelector:
                matchLabels:
                  ticketing.io/tier: api
          ports:
            - protocol: TCP
              port: 4317
            - protocol: TCP
              port: 4318
        - from:
            - namespaceSelector:
                matchLabels:
                  kubernetes.io/metadata.name: monitoring
          ports:
            - protocol: TCP
              port: 8888
      egress:
        - to:
            - podSelector:
                matchLabels:
                  app.kubernetes.io/name: tempo
                  app.kubernetes.io/instance: tempo
          ports:
            - protocol: TCP
              port: 4317
        - to:
            - namespaceSelector:
                matchLabels:
                  kubernetes.io/metadata.name: kube-system
          ports:
            - protocol: UDP
              port: 53
            - protocol: TCP
              port: 53
