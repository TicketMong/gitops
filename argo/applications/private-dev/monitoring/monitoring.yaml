apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-private-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Medikong/gitops.git
    targetRevision: HEAD
    path: argo/applications/private-dev/monitoring
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
