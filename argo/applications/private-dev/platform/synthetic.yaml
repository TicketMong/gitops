apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: synthetic-traffic-private-dev
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  project: default
  source:
    repoURL: https://github.com/Medikong/gitops.git
    targetRevision: HEAD
    path: platform/synthetic
    helm:
      releaseName: synthetic-traffic
      valueFiles:
        - values/private-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: synthetic
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
