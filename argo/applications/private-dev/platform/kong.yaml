apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kong-private-dev
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-25"
spec:
  project: default
  sources:
    - repoURL: https://charts.konghq.com
      chart: kong
      targetRevision: 3.2.0
      helm:
        releaseName: kong
        valueFiles:
          - $values/platform/kong/values-private-dev.yaml
    - repoURL: https://github.com/Medikong/gitops.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: kong
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    managedNamespaceMetadata:
      labels:
        app.kubernetes.io/name: kong
        app.kubernetes.io/part-of: medikong
        medikong.io/platform: api-gateway
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
