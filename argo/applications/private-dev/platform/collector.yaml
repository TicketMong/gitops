apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: opentelemetry-collector-private-dev
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-17"
spec:
  project: default
  sources:
    - repoURL: https://open-telemetry.github.io/opentelemetry-helm-charts
      chart: opentelemetry-collector
      targetRevision: 0.158.0
      helm:
        releaseName: opentelemetry-collector
        valueFiles:
          - $values/platform/observability/collector/values/private-dev.yaml
    - repoURL: https://github.com/Medikong/gitops.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    managedNamespaceMetadata:
      labels:
        app.kubernetes.io/name: observability
        app.kubernetes.io/part-of: medikong
        medikong.io/platform: observability
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
