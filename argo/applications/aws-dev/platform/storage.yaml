apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: storage-aws-dev
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-30"
spec:
  project: default
  source:
    repoURL: https://github.com/Medikong/gitops.git
    targetRevision: HEAD
    path: platform/storage
    directory:
      include: storageclass-aws-gp3.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
