apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: synthetic-credentials-aws-dev
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "20"
spec:
  project: default
  source:
    repoURL: https://github.com/Medikong/gitops.git
    targetRevision: HEAD
    path: platform/synthetic-credentials
  destination:
    server: https://kubernetes.default.svc
    namespace: synthetic
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
