environment: chart-default

app:
  name: sample-service
  namespace: medical-sample
  labels: {}

deployment:
  replicas: 1
  annotations: {}
  podAnnotations: {}
  podLabels: {}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

image:
  registry: ""
  repository: zexpand/sample-service
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []

container:
  name: ""
  port: 8080
  env: []
  envFrom: []
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  readinessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10
  livenessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 15
    periodSeconds: 20

podSecurityContext: {}
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  capabilities:
    drop:
      - ALL

nodeSelector: {}
tolerations: []
affinity: {}

serviceAccount:
  create: true
  name: ""
  annotations: {}
  automountServiceAccountToken: false

rbac:
  create: true
  rules: []

service:
  type: ClusterIP
  port: 8080
  targetPort: http
  annotations: {}

ingress:
  enabled: false
  name: ""
  className: kong
  annotations: {}
  objects: []
  hosts:
    - host: ""
      paths:
        - path: /
          pathType: Prefix

networkPolicy:
  enabled: true
  policyTypes:
    - Ingress
  ingress: []

pdb:
  enabled: false
  minAvailable: 1

hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 60

serviceMonitor:
  enabled: false
  labels: {}
  interval: 30s
  path: /metrics
  port: http
  networkPolicy:
    enabled: true
    namespace: monitoring
