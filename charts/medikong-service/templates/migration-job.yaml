{{- if .Values.migration.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ printf "%s-migrate" .Values.app.name | trunc 63 | trimSuffix "-" | quote }}
  namespace: {{ .Values.app.namespace | quote }}
  labels:
    app.kubernetes.io/name: {{ .Values.app.name | quote }}
    app.kubernetes.io/instance: {{ .Release.Name | quote }}
    app.kubernetes.io/component: migration
    app.kubernetes.io/part-of: medikong
{{- with .Values.migration.annotations }}
  annotations:
{{ toYaml . | nindent 4 }}
{{- end }}
spec:
  activeDeadlineSeconds: {{ .Values.migration.activeDeadlineSeconds }}
  backoffLimit: {{ .Values.migration.backoffLimit }}
  ttlSecondsAfterFinished: {{ .Values.migration.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        app: {{ .Values.app.name | quote }}
        app.kubernetes.io/name: {{ .Values.app.name | quote }}
        app.kubernetes.io/instance: {{ .Release.Name | quote }}
        app.kubernetes.io/component: migration
        app.kubernetes.io/part-of: medikong
        medikong.io/environment: {{ .Values.environment | quote }}
{{- with .Values.app.labels }}
{{ toYaml . | nindent 8 }}
{{- end }}
{{- with .Values.migration.podLabels }}
{{ toYaml . | nindent 8 }}
{{- end }}
{{- with .Values.migration.podAnnotations }}
      annotations:
{{ toYaml . | nindent 8 }}
{{- end }}
    spec:
{{- if or .Values.migration.serviceAccount.create .Values.migration.serviceAccount.name }}
      serviceAccountName: {{ default (printf "%s-migration" .Values.app.name) .Values.migration.serviceAccount.name | trunc 63 | trimSuffix "-" | quote }}
{{- end }}
      automountServiceAccountToken: false
{{- with .Values.imagePullSecrets }}
      imagePullSecrets:
{{ toYaml . | nindent 8 }}
{{- end }}
{{- with .Values.podSecurityContext }}
      securityContext:
{{ toYaml . | nindent 8 }}
{{- end }}
      restartPolicy: Never
      containers:
        - name: migrate
{{- if .Values.image.registry }}
          image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}:{{ .Values.image.tag }}"
{{- else }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
{{- end }}
          imagePullPolicy: {{ .Values.image.pullPolicy | quote }}
{{- with .Values.migration.command }}
          command:
{{ toYaml . | nindent 12 }}
{{- end }}
{{- with .Values.migration.args }}
          args:
{{ toYaml . | nindent 12 }}
{{- end }}
{{- with .Values.migration.env }}
          env:
{{ toYaml . | nindent 12 }}
{{- end }}
{{- with .Values.migration.envFrom }}
          envFrom:
{{ toYaml . | nindent 12 }}
{{- end }}
{{- with (default .Values.container.resources .Values.migration.resources) }}
          resources:
{{ toYaml . | nindent 12 }}
{{- end }}
{{- with .Values.securityContext }}
          securityContext:
{{ toYaml . | nindent 12 }}
{{- end }}
{{- with .Values.nodeSelector }}
      nodeSelector:
{{ toYaml . | nindent 8 }}
{{- end }}
{{- with .Values.affinity }}
      affinity:
{{ toYaml . | nindent 8 }}
{{- end }}
{{- with .Values.tolerations }}
      tolerations:
{{ toYaml . | nindent 8 }}
{{- end }}
{{- end }}
