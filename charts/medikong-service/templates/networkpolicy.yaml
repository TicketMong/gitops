{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ printf "allow-%s-ingress" .Values.app.name | quote }}
  namespace: {{ .Values.app.namespace | quote }}
  labels:
    app.kubernetes.io/name: {{ .Values.app.name | quote }}
    app.kubernetes.io/instance: {{ .Release.Name | quote }}
    app.kubernetes.io/part-of: medikong
spec:
  podSelector:
    matchLabels:
      app: {{ .Values.app.name | quote }}
  policyTypes:
{{ toYaml .Values.networkPolicy.policyTypes | nindent 4 }}
{{- $serviceMonitorNetworkPolicy := default dict .Values.serviceMonitor.networkPolicy }}
{{- $allowPrometheusScrape := and .Values.serviceMonitor.enabled (default true $serviceMonitorNetworkPolicy.enabled) }}
{{- $monitoringNamespace := default "monitoring" $serviceMonitorNetworkPolicy.namespace }}
{{- $extraPrometheusScrapePorts := default (list) $serviceMonitorNetworkPolicy.extraPorts }}
{{- if or .Values.networkPolicy.ingress $allowPrometheusScrape }}
  ingress:
{{- with .Values.networkPolicy.ingress }}
{{ toYaml . | nindent 4 }}
{{- end }}
{{- if $allowPrometheusScrape }}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ $monitoringNamespace | quote }}
      ports:
        - protocol: TCP
          port: {{ .Values.serviceMonitor.port | quote }}
{{- range $extraPrometheusScrapePorts }}
        - protocol: TCP
          port: {{ . }}
{{- end }}
{{- end }}
{{- else }}
  ingress: []
{{- end }}
{{- if .Values.networkPolicy.egress }}
  egress:
{{ toYaml .Values.networkPolicy.egress | nindent 4 }}
{{- else if has "Egress" .Values.networkPolicy.policyTypes }}
  egress: []
{{- end }}
{{- end }}
