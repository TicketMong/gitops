apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.app.name | quote }}
  namespace: {{ .Values.app.namespace | quote }}
  labels:
    app.kubernetes.io/name: {{ .Values.app.name | quote }}
    app.kubernetes.io/instance: {{ .Release.Name | quote }}
    app.kubernetes.io/managed-by: {{ .Release.Service | quote }}
    app.kubernetes.io/part-of: medikong
    medikong.io/environment: {{ .Values.environment | quote }}
{{- with .Values.app.labels }}
{{ toYaml . | nindent 4 }}
{{- end }}
{{- with .Values.deployment.annotations }}
  annotations:
{{ toYaml . | nindent 4 }}
{{- end }}
spec:
{{- if not .Values.hpa.enabled }}
  replicas: {{ .Values.deployment.replicas }}
{{- end }}
  selector:
    matchLabels:
      app: {{ .Values.app.name | quote }}
  strategy:
{{ toYaml .Values.deployment.strategy | nindent 4 }}
  template:
    metadata:
      labels:
        app: {{ .Values.app.name | quote }}
        app.kubernetes.io/name: {{ .Values.app.name | quote }}
        app.kubernetes.io/instance: {{ .Release.Name | quote }}
        medikong.io/environment: {{ .Values.environment | quote }}
{{- with .Values.app.labels }}
{{ toYaml . | nindent 8 }}
{{- end }}
{{- with .Values.deployment.podLabels }}
{{ toYaml . | nindent 8 }}
{{- end }}
{{- with .Values.deployment.podAnnotations }}
      annotations:
{{ toYaml . | nindent 8 }}
{{- end }}
    spec:
{{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ default .Values.app.name .Values.serviceAccount.name | quote }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
{{- end }}
{{- with .Values.imagePullSecrets }}
      imagePullSecrets:
{{ toYaml . | nindent 8 }}
{{- end }}
{{- with .Values.podSecurityContext }}
      securityContext:
{{ toYaml . | nindent 8 }}
{{- end }}
      containers:
        - name: {{ default .Values.app.name .Values.container.name | quote }}
{{- if .Values.image.registry }}
          image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}:{{ .Values.image.tag }}"
{{- else }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
{{- end }}
          imagePullPolicy: {{ .Values.image.pullPolicy | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.container.port }}
              protocol: TCP
{{- $observabilityEnv := list
  (dict "name" "SERVICE_VERSION" "value" .Values.image.tag)
  (dict "name" "SERVICE_ENVIRONMENT" "value" .Values.environment)
}}
{{- $sqlalchemy := .Values.database.sqlalchemy }}
{{- $observabilityEnv = append $observabilityEnv (dict "name" "SQLALCHEMY_POOL_SIZE" "value" (printf "%v" $sqlalchemy.poolSize)) }}
{{- $observabilityEnv = append $observabilityEnv (dict "name" "SQLALCHEMY_MAX_OVERFLOW" "value" (printf "%v" $sqlalchemy.maxOverflow)) }}
{{- $observabilityEnv = append $observabilityEnv (dict "name" "SQLALCHEMY_POOL_TIMEOUT_SECONDS" "value" (printf "%v" $sqlalchemy.poolTimeoutSeconds)) }}
{{- $observabilityEnv = append $observabilityEnv (dict "name" "SQLALCHEMY_POOL_RECYCLE_SECONDS" "value" (printf "%v" $sqlalchemy.poolRecycleSeconds)) }}
{{- if .Values.observability.tracing.enabled }}
{{- $observabilityEnv = append $observabilityEnv (dict "name" "OTEL_TRACES_EXPORTER" "value" "otlp") }}
{{- with .Values.observability.tracing.otlpEndpoint }}
{{- $observabilityEnv = append $observabilityEnv (dict "name" "OTEL_EXPORTER_OTLP_ENDPOINT" "value" .) }}
{{- end }}
{{- with .Values.observability.tracing.excludedUrls }}
{{- $observabilityEnv = append $observabilityEnv (dict "name" "OTEL_PYTHON_FASTAPI_EXCLUDED_URLS" "value" .) }}
{{- end }}
{{- end }}
{{- if .Values.observability.profiling.enabled }}
{{- $profiling := .Values.observability.profiling }}
{{- $observabilityEnv = append $observabilityEnv (dict "name" "PYROSCOPE_ENABLED" "value" "true") }}
{{- with $profiling.serverAddress }}
{{- $observabilityEnv = append $observabilityEnv (dict "name" "PYROSCOPE_SERVER_ADDRESS" "value" .) }}
{{- end }}
{{- with $profiling.applicationName }}
{{- $observabilityEnv = append $observabilityEnv (dict "name" "PYROSCOPE_APPLICATION_NAME" "value" .) }}
{{- end }}
{{- $observabilityEnv = append $observabilityEnv (dict "name" "PYROSCOPE_SAMPLE_RATE" "value" (printf "%v" $profiling.sampleRate)) }}
{{- $observabilityEnv = append $observabilityEnv (dict "name" "PYROSCOPE_SPAN_PROFILES_ENABLED" "value" (printf "%v" $profiling.spanProfilesEnabled)) }}
{{- $observabilityEnv = append $observabilityEnv (dict "name" "PYROSCOPE_ONCPU" "value" (printf "%v" $profiling.oncpu)) }}
{{- $observabilityEnv = append $observabilityEnv (dict "name" "PYROSCOPE_GIL_ONLY" "value" (printf "%v" $profiling.gilOnly)) }}
{{- $pyroscopeTags := list }}
{{- range $key := keys $profiling.tags | sortAlpha }}
{{- $pyroscopeTags = append $pyroscopeTags (printf "%s=%v" $key (index $profiling.tags $key)) }}
{{- end }}
{{- if $pyroscopeTags }}
{{- $observabilityEnv = append $observabilityEnv (dict "name" "PYROSCOPE_TAGS" "value" (join "," $pyroscopeTags)) }}
{{- end }}
{{- with $profiling.basicAuthUsername }}
{{- $observabilityEnv = append $observabilityEnv (dict "name" "PYROSCOPE_BASIC_AUTH_USERNAME" "value" .) }}
{{- end }}
{{- with $profiling.basicAuthPassword }}
{{- $observabilityEnv = append $observabilityEnv (dict "name" "PYROSCOPE_BASIC_AUTH_PASSWORD" "value" .) }}
{{- end }}
{{- with $profiling.tenantId }}
{{- $observabilityEnv = append $observabilityEnv (dict "name" "PYROSCOPE_TENANT_ID" "value" .) }}
{{- end }}
{{- end }}
{{- $containerEnv := concat $observabilityEnv .Values.container.env }}
{{- with $containerEnv }}
          env:
{{ toYaml . | nindent 12 }}
{{- end }}
{{- with .Values.container.envFrom }}
          envFrom:
{{ toYaml . | nindent 12 }}
{{- end }}
{{- with .Values.container.readinessProbe }}
          readinessProbe:
{{ toYaml . | nindent 12 }}
{{- end }}
{{- with .Values.container.livenessProbe }}
          livenessProbe:
{{ toYaml . | nindent 12 }}
{{- end }}
{{- with .Values.container.resources }}
          resources:
{{ toYaml . | nindent 12 }}
{{- end }}
{{- with .Values.securityContext }}
          securityContext:
{{ toYaml . | nindent 12 }}
{{- end }}
{{- with .Values.nodeSelector }}
      nodeSelector:
{{ toYaml . | nindent 8 }}
{{- end }}
{{- with .Values.affinity }}
      affinity:
{{ toYaml . | nindent 8 }}
{{- end }}
{{- with .Values.tolerations }}
      tolerations:
{{ toYaml . | nindent 8 }}
{{- end }}
