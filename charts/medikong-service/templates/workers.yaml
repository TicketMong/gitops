{{- $root := . }}
{{- range $worker := .Values.workers }}
{{- if default true $worker.enabled }}
{{- $workerName := printf "%s-%s" $root.Values.app.name $worker.name }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $workerName | quote }}
  namespace: {{ $root.Values.app.namespace | quote }}
  labels:
    app.kubernetes.io/name: {{ $workerName | quote }}
    app.kubernetes.io/instance: {{ $root.Release.Name | quote }}
    app.kubernetes.io/managed-by: {{ $root.Release.Service | quote }}
    app.kubernetes.io/part-of: medikong
    medikong.io/environment: {{ $root.Values.environment | quote }}
    medikong.io/workload: {{ $worker.name | quote }}
{{- with $root.Values.app.labels }}
{{ toYaml . | nindent 4 }}
{{- end }}
spec:
  replicas: {{ default 1 $worker.replicas }}
  selector:
    matchLabels:
      app: {{ $workerName | quote }}
      medikong.io/workload: {{ $worker.name | quote }}
  strategy:
{{ toYaml $root.Values.deployment.strategy | nindent 4 }}
  template:
    metadata:
      labels:
        app: {{ $workerName | quote }}
        app.kubernetes.io/name: {{ $workerName | quote }}
        app.kubernetes.io/instance: {{ $root.Release.Name | quote }}
        medikong.io/environment: {{ $root.Values.environment | quote }}
        medikong.io/workload: {{ $worker.name | quote }}
{{- with $root.Values.app.labels }}
{{ toYaml . | nindent 8 }}
{{- end }}
{{- with $root.Values.deployment.podLabels }}
{{ toYaml . | nindent 8 }}
{{- end }}
{{- with $worker.podLabels }}
{{ toYaml . | nindent 8 }}
{{- end }}
{{- if or $root.Values.deployment.podAnnotations $worker.podAnnotations }}
      annotations:
{{- with $root.Values.deployment.podAnnotations }}
{{ toYaml . | nindent 8 }}
{{- end }}
{{- with $worker.podAnnotations }}
{{ toYaml . | nindent 8 }}
{{- end }}
{{- end }}
    spec:
{{- if $root.Values.serviceAccount.create }}
      serviceAccountName: {{ default $root.Values.app.name $root.Values.serviceAccount.name | quote }}
      automountServiceAccountToken: {{ $root.Values.serviceAccount.automountServiceAccountToken }}
{{- end }}
{{- with $root.Values.imagePullSecrets }}
      imagePullSecrets:
{{ toYaml . | nindent 8 }}
{{- end }}
{{- with $root.Values.podSecurityContext }}
      securityContext:
{{ toYaml . | nindent 8 }}
{{- end }}
      containers:
        - name: {{ default $worker.name $worker.containerName | quote }}
{{- if $root.Values.image.registry }}
          image: "{{ $root.Values.image.registry }}/{{ $root.Values.image.repository }}:{{ $root.Values.image.tag }}"
{{- else }}
          image: "{{ $root.Values.image.repository }}:{{ $root.Values.image.tag }}"
{{- end }}
          imagePullPolicy: {{ $root.Values.image.pullPolicy | quote }}
{{- with $worker.command }}
          command:
{{ toYaml . | nindent 12 }}
{{- end }}
{{- with $worker.args }}
          args:
{{ toYaml . | nindent 12 }}
{{- end }}
{{- $observabilityEnv := list
  (dict "name" "SERVICE_VERSION" "value" $root.Values.image.tag)
  (dict "name" "SERVICE_ENVIRONMENT" "value" $root.Values.environment)
}}
{{- $sqlalchemy := $root.Values.database.sqlalchemy }}
{{- if ne $sqlalchemy.enabled false }}
{{- $observabilityEnv = append $observabilityEnv (dict "name" "SQLALCHEMY_POOL_SIZE" "value" (printf "%v" $sqlalchemy.poolSize)) }}
{{- $observabilityEnv = append $observabilityEnv (dict "name" "SQLALCHEMY_MAX_OVERFLOW" "value" (printf "%v" $sqlalchemy.maxOverflow)) }}
{{- $observabilityEnv = append $observabilityEnv (dict "name" "SQLALCHEMY_POOL_TIMEOUT_SECONDS" "value" (printf "%v" $sqlalchemy.poolTimeoutSeconds)) }}
{{- $observabilityEnv = append $observabilityEnv (dict "name" "SQLALCHEMY_POOL_RECYCLE_SECONDS" "value" (printf "%v" $sqlalchemy.poolRecycleSeconds)) }}
{{- end }}
{{- if $root.Values.observability.tracing.enabled }}
{{- $observabilityEnv = append $observabilityEnv (dict "name" "OTEL_TRACES_EXPORTER" "value" "otlp") }}
{{- with $root.Values.observability.tracing.otlpEndpoint }}
{{- $observabilityEnv = append $observabilityEnv (dict "name" "OTEL_EXPORTER_OTLP_ENDPOINT" "value" .) }}
{{- end }}
{{- end }}
{{- $containerEnv := concat $observabilityEnv $root.Values.container.env (default (list) $worker.env) }}
{{- with $containerEnv }}
          env:
{{ toYaml . | nindent 12 }}
{{- end }}
{{- $containerEnvFrom := concat (default (list) $root.Values.container.envFrom) (default (list) $worker.envFrom) }}
{{- with $containerEnvFrom }}
          envFrom:
{{ toYaml . | nindent 12 }}
{{- end }}
{{- with default $root.Values.container.resources $worker.resources }}
          resources:
{{ toYaml . | nindent 12 }}
{{- end }}
{{- with $root.Values.securityContext }}
          securityContext:
{{ toYaml . | nindent 12 }}
{{- end }}
{{- with $root.Values.nodeSelector }}
      nodeSelector:
{{ toYaml . | nindent 8 }}
{{- end }}
{{- with $root.Values.affinity }}
      affinity:
{{ toYaml . | nindent 8 }}
{{- end }}
{{- with $root.Values.tolerations }}
      tolerations:
{{ toYaml . | nindent 8 }}
{{- end }}
{{- if and $root.Values.networkPolicy.enabled (has "Egress" $root.Values.networkPolicy.policyTypes) }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ printf "allow-%s-egress" $workerName | quote }}
  namespace: {{ $root.Values.app.namespace | quote }}
  labels:
    app.kubernetes.io/name: {{ $workerName | quote }}
    app.kubernetes.io/instance: {{ $root.Release.Name | quote }}
    app.kubernetes.io/part-of: medikong
spec:
  podSelector:
    matchLabels:
      app: {{ $workerName | quote }}
      medikong.io/workload: {{ $worker.name | quote }}
  policyTypes:
    - Egress
{{- if $root.Values.networkPolicy.egress }}
  egress:
{{ toYaml $root.Values.networkPolicy.egress | nindent 4 }}
{{- else }}
  egress: []
{{- end }}
{{- end }}
{{- end }}
{{- end }}
