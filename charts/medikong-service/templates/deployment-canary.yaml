{{- if .Values.canary.enabled }}
{{- $canaryVersion := default "v2" .Values.canary.version }}
{{- $canaryName := printf "%s-%s" .Values.app.name (default $canaryVersion .Values.canary.nameSuffix) }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $canaryName | quote }}
  namespace: {{ .Values.app.namespace | quote }}
  labels:
    app.kubernetes.io/name: {{ $canaryName | quote }}
    app.kubernetes.io/instance: {{ .Release.Name | quote }}
    app.kubernetes.io/managed-by: {{ .Release.Service | quote }}
    app.kubernetes.io/part-of: medikong
    medikong.io/environment: {{ .Values.environment | quote }}
    medikong.io/canary: "true"
{{- with .Values.app.labels }}
{{ toYaml . | nindent 4 }}
{{- end }}
spec:
  replicas: {{ .Values.canary.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.app.name | quote }}
      version: {{ $canaryVersion | quote }}
  strategy:
{{ toYaml .Values.deployment.strategy | nindent 4 }}
  template:
    metadata:
      labels:
        app: {{ .Values.app.name | quote }}
        app.kubernetes.io/name: {{ $canaryName | quote }}
        app.kubernetes.io/instance: {{ .Release.Name | quote }}
        medikong.io/environment: {{ .Values.environment | quote }}
        medikong.io/canary: "true"
        version: {{ $canaryVersion | quote }}
{{- with .Values.app.labels }}
{{ toYaml . | nindent 8 }}
{{- end }}
{{- with .Values.canary.podLabels }}
{{ toYaml . | nindent 8 }}
{{- end }}
{{- with .Values.canary.podAnnotations }}
      annotations:
{{ toYaml . | nindent 8 }}
{{- end }}
    spec:
{{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ default .Values.app.name .Values.serviceAccount.name | quote }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
{{- end }}
{{- with .Values.imagePullSecrets }}
      imagePullSecrets:
{{ toYaml . | nindent 8 }}
{{- end }}
{{- with .Values.podSecurityContext }}
      securityContext:
{{ toYaml . | nindent 8 }}
{{- end }}
      containers:
        - name: {{ default .Values.app.name .Values.container.name | quote }}
{{- if .Values.image.registry }}
          image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}:{{ default .Values.image.tag .Values.canary.image.tag }}"
{{- else }}
          image: "{{ .Values.image.repository }}:{{ default .Values.image.tag .Values.canary.image.tag }}"
{{- end }}
          imagePullPolicy: {{ .Values.image.pullPolicy | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.container.port }}
              protocol: TCP
{{- with .Values.container.env }}
          env:
{{ toYaml . | nindent 12 }}
{{- end }}
{{- with .Values.container.envFrom }}
          envFrom:
{{ toYaml . | nindent 12 }}
{{- end }}
{{- with .Values.container.readinessProbe }}
          readinessProbe:
{{ toYaml . | nindent 12 }}
{{- end }}
{{- with .Values.container.livenessProbe }}
          livenessProbe:
{{ toYaml . | nindent 12 }}
{{- end }}
{{- with default .Values.container.resources .Values.canary.resources }}
          resources:
{{ toYaml . | nindent 12 }}
{{- end }}
{{- with .Values.securityContext }}
          securityContext:
{{ toYaml . | nindent 12 }}
{{- end }}
{{- with .Values.nodeSelector }}
      nodeSelector:
{{ toYaml . | nindent 8 }}
{{- end }}
{{- with .Values.affinity }}
      affinity:
{{ toYaml . | nindent 8 }}
{{- end }}
{{- with .Values.tolerations }}
      tolerations:
{{ toYaml . | nindent 8 }}
{{- end }}
{{- end }}
