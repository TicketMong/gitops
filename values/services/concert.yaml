app:
  name: concert-service
  namespace: ticketing-concert
  labels:
    ticketing.io/service: concert
    ticketing.io/tier: api

image:
  repository: concert-service
  tag: c5b8461da38b922fe0cf0b3cc224b226a7ebe297

deployment:
  replicas: 1
  podLabels:
    sidecar.istio.io/inject: "true"
  podAnnotations:
    sidecar.istio.io/inject: "true"
    sidecar.istio.io/proxyCPU: 25m
    sidecar.istio.io/proxyMemory: 64Mi
    sidecar.istio.io/proxyCPULimit: 200m
    sidecar.istio.io/proxyMemoryLimit: 256Mi

container:
  port: 8082
  env:
    - name: DATABASE_URL
      value: postgresql+psycopg://user:password@concert-db:5432/concert_db

service:
  port: 8082
  targetPort: http

ingress:
  enabled: true
  className: kong
  objects:
    - name: concert-public-api
      annotations:
        konghq.com/plugins: ticketing-rate-limit-concerts,ticketing-correlation-id,ticketing-prometheus
      hosts:
        - host: ""
          paths:
            - path: /concerts
              pathType: Prefix
            - path: /performances
              pathType: Prefix
    - name: concert-debug-api
      annotations:
        konghq.com/plugins: ticketing-correlation-id,ticketing-prometheus
      hosts:
        - host: ""
          paths:
            - path: /__debug/concert/status
              pathType: Prefix
    - name: concert-provider-api
      annotations:
        konghq.com/plugins: ticketing-jwt,ticketing-identity-headers,ticketing-role-provider,ticketing-rate-limit-concerts,ticketing-correlation-id,ticketing-prometheus
        konghq.com/regex-priority: "100"
      hosts:
        - host: ""
          paths:
            - path: /provider/venues
              pathType: Prefix
            - path: /~/provider/concerts$
              pathType: ImplementationSpecific
            - path: /~/provider/concerts/[^/]+$
              pathType: ImplementationSpecific
            - path: /~/provider/concerts/[^/]+/(showtimes|sale-policy|open-request|review-status)$
              pathType: ImplementationSpecific
            - path: /~/provider/showtimes/[^/]+$
              pathType: ImplementationSpecific
            - path: /~/provider/showtimes/[^/]+/(seat-map|seat-inventory|seat-grades|hold-seat-requests)$
              pathType: ImplementationSpecific
    - name: concert-admin-api
      annotations:
        konghq.com/plugins: ticketing-jwt,ticketing-identity-headers,ticketing-role-admin,ticketing-rate-limit-concerts,ticketing-correlation-id,ticketing-prometheus
        konghq.com/regex-priority: "100"
      hosts:
        - host: ""
          paths:
            - path: /admin/concert-requests
              pathType: Prefix
            - path: /~/admin/concerts/[^/]+/(open-schedule|sale-policy|sale-policy/approve|sale-policy/reject|canceled-seat-reopen-policy)$
              pathType: ImplementationSpecific

networkPolicy:
  enabled: true
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kong
      ports:
        - protocol: TCP
          port: 8082
hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70
