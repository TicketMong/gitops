app:
  name: dashboard
  namespace: ticketing-dashboard
  labels:
    ticketing.io/service: dashboard
    ticketing.io/tier: frontend

image:
  repository: dashboard
  tag: dev

deployment:
  replicas: 2

container:
  port: 8080
  readinessProbe: null
  livenessProbe: null

service:
  port: 80
  targetPort: http

ingress:
  enabled: true
  name: dashboard
  className: kong
  annotations:
    konghq.com/plugins: ticketing-correlation-id,ticketing-prometheus
  hosts:
    - host: ""
      paths:
        - path: /
          pathType: Prefix

networkPolicy:
  enabled: true
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kong
      ports:
        - protocol: TCP
          port: 8080
