app:
  name: auth-service
  namespace: ticketing-auth
  labels:
    ticketing.io/service: auth
    ticketing.io/tier: api

image:
  repository: auth-service
  tag: ce3bd6e6b2c0a316bc97f66cb3edf4f87185d101

deployment:
  replicas: 3

container:
  port: 8080
  resources:
    requests:
      cpu: 500m
      memory: 128Mi
    limits:
      cpu: "2"
      memory: 512Mi
  env:
    - name: DATABASE_URL
      value: postgresql+psycopg://user:password@auth-db:5432/auth_db
    - name: AUTH_TOKEN_TTL_SECONDS
      value: "900"
    - name: AUTH_REFRESH_TOKEN_TTL_SECONDS
      value: "604800"
    - name: JWT_SECRET
      value: ticketing-dev-secret
    - name: JWT_ISSUER
      value: auth-service

service:
  port: 8080
  targetPort: http

ingress:
  enabled: true
  className: kong
  objects:
    - name: auth-api
      annotations:
        konghq.com/plugins: ticketing-correlation-id,ticketing-prometheus
      hosts:
        - host: ""
          paths:
            - path: /auth
              pathType: Prefix
    - name: auth-debug-api
      annotations:
        konghq.com/plugins: ticketing-correlation-id,ticketing-prometheus
      hosts:
        - host: ""
          paths:
            - path: /__debug/auth/status
              pathType: Prefix

networkPolicy:
  enabled: true
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kong
      ports:
        - protocol: TCP
          port: 8080
hpa:
  enabled: true
  minReplicas: 3
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70

observability:
  profiling:
    serverAddress: http://pyroscope.observability.svc.cluster.local:4040
    sampleRate: 100
