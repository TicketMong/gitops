app:
  name: auth-service
  namespace: ticketing-auth
  labels:
    ticketing.io/service: auth
    ticketing.io/tier: api

image:
  repository: auth-service
  tag: 25f4c4d3e2e7d6933353d412e26ba4b4ba89cce2

deployment:
  replicas: 2

container:
  port: 8080
  env:
    - name: DATABASE_URL
      value: postgresql+psycopg://user:password@auth-db:5432/auth_db
    - name: AUTH_TOKEN_TTL_SECONDS
      value: "900"
    - name: AUTH_REFRESH_TOKEN_TTL_SECONDS
      value: "604800"
    - name: JWT_SECRET
      value: ticketing-dev-secret
    - name: JWT_ISSUER
      value: auth-service

service:
  port: 8080
  targetPort: http

ingress:
  enabled: true
  className: kong
  objects:
    - name: auth-api
      annotations:
        konghq.com/plugins: ticketing-correlation-id,ticketing-prometheus
      hosts:
        - host: ""
          paths:
            - path: /auth
              pathType: Prefix

networkPolicy:
  enabled: true
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kong
      ports:
        - protocol: TCP
          port: 8080
