app:
  name: auth-service
  namespace: ticketing-auth
  labels:
    ticketing.io/service: auth
    ticketing.io/tier: api

image:
  repository: auth-service
  tag: dev

deployment:
  replicas: 3

container:
  port: 8080
  resources:
    requests:
      cpu: 1000m
      memory: 256Mi
    limits:
      cpu: "2"
      memory: 768Mi
  env:
    - name: DATABASE_URL
      value: postgres://user:password@auth-db:5432/auth_db?sslmode=disable
    - name: AUTH_TOKEN_TTL_SECONDS
      value: "900"
    - name: AUTH_REFRESH_TOKEN_TTL_SECONDS
      value: "604800"
    - name: JWT_SECRET
      value: ticketing-dev-secret
    - name: JWT_ISSUER
      value: auth-service
    - name: AUTH_DEV_TEST_TOKEN_ENABLED
      value: "false"
  readinessProbe:
    httpGet:
      path: /readyz
      port: http
    initialDelaySeconds: 3
    periodSeconds: 5
  livenessProbe:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10

service:
  port: 8080
  targetPort: http

ingress:
  enabled: true
  className: kong
  objects:
    - name: auth-api
      annotations:
        konghq.com/plugins: ticketing-correlation-id,ticketing-prometheus
      hosts:
        - host: ""
          paths:
            - path: /auth
              pathType: Prefix
    - name: auth-debug-api
      annotations:
        konghq.com/plugins: ticketing-correlation-id,ticketing-prometheus
      hosts:
        - host: ""
          paths:
            - path: /__debug/auth/status
              pathType: Prefix

networkPolicy:
  enabled: true
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kong
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: auth-db
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
          podSelector:
            matchLabels:
              app.kubernetes.io/name: opentelemetry-collector
      ports:
        - protocol: TCP
          port: 4317
        - protocol: TCP
          port: 4318
nodeSelector:
  role: app
observability:
  profiling:
    serverAddress: http://pyroscope.observability.svc.cluster.local:4040
