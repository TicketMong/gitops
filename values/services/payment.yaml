app:
  name: payment-service
  namespace: ticketing-payment
  labels:
    ticketing.io/service: payment
    ticketing.io/tier: api

image:
  repository: payment-service
  tag: 032adcd247def6ef90b814819bfacbae41d06289

deployment:
  replicas: 1
  podLabels:
    sidecar.istio.io/inject: "true"
  podAnnotations:
    sidecar.istio.io/inject: "true"
    sidecar.istio.io/proxyCPU: 25m
    sidecar.istio.io/proxyMemory: 64Mi
    sidecar.istio.io/proxyCPULimit: 200m
    sidecar.istio.io/proxyMemoryLimit: 256Mi

container:
  port: 8080
  env:
    - name: DATABASE_URL
      value: postgresql+psycopg://user:password@payment-db:5432/payment_db
    - name: KAFKA_BOOTSTRAP_SERVERS
      value: kafka.ticketing-messaging.svc.cluster.local:9092
    - name: PAYMENT_APPROVED_TOPIC
      value: payment-approved
    - name: PAYMENT_FAILED_TOPIC
      value: payment-failed

service:
  port: 8080
  targetPort: http

ingress:
  enabled: true
  className: kong
  objects:
    - name: payment-customer-api
      annotations:
        konghq.com/plugins: ticketing-jwt,ticketing-identity-headers,ticketing-role-customer,ticketing-rate-limit-payments,ticketing-correlation-id,ticketing-prometheus
      hosts:
        - host: ""
          paths:
            - path: /payments
              pathType: Prefix
    - name: payment-debug-api
      annotations:
        konghq.com/plugins: ticketing-correlation-id,ticketing-prometheus
      hosts:
        - host: ""
          paths:
            - path: /__debug/payment/status
              pathType: Prefix
    - name: payment-provider-api
      annotations:
        konghq.com/plugins: ticketing-jwt,ticketing-identity-headers,ticketing-role-provider,ticketing-rate-limit-payments,ticketing-correlation-id,ticketing-prometheus
        konghq.com/regex-priority: "100"
      hosts:
        - host: ""
          paths:
            - path: /~/provider/concerts/[^/]+/settlement-basis$
              pathType: ImplementationSpecific
    - name: payment-admin-api
      annotations:
        konghq.com/plugins: ticketing-jwt,ticketing-identity-headers,ticketing-role-admin,ticketing-rate-limit-payments,ticketing-correlation-id,ticketing-prometheus
        konghq.com/regex-priority: "100"
      hosts:
        - host: ""
          paths:
            - path: /~/admin/concerts/[^/]+/settlement-basis$
              pathType: ImplementationSpecific

networkPolicy:
  enabled: true
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kong
      ports:
        - protocol: TCP
          port: 8080
hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70
