app:
  name: payment-service
  namespace: ticketing-payment
  labels:
    ticketing.io/service: payment
    ticketing.io/tier: api

image:
  repository: payment-service
  tag: d779477902afa60e2eec3ba985c0b17b6a680748

deployment:
  replicas: 2

container:
  port: 8080
  env:
    - name: DATABASE_URL
      value: postgresql+psycopg://user:password@payment-db:5432/payment_db
    - name: JWT_SECRET
      value: ticketing-dev-secret
    - name: JWT_ISSUER
      value: auth-service

service:
  port: 8080
  targetPort: http

ingress:
  enabled: true
  name: payment-api
  className: kong
  annotations:
    konghq.com/plugins: ticketing-jwt,ticketing-identity-headers,ticketing-rate-limit-payments,ticketing-correlation-id,ticketing-prometheus
  hosts:
    - host: ""
      paths:
        - path: /payments
          pathType: Prefix
        - path: /provider/settlements
          pathType: Prefix

networkPolicy:
  enabled: true
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kong
      ports:
        - protocol: TCP
          port: 8080
