app:
  name: ticket-service
  namespace: ticketing-ticket
  labels:
    ticketing.io/service: ticket
    ticketing.io/tier: api

image:
  repository: ticket-service
  tag: v0.2.0

deployment:
  replicas: 1
  podLabels:
    sidecar.istio.io/inject: "true"
  podAnnotations:
    sidecar.istio.io/inject: "true"
    sidecar.istio.io/proxyCPU: 5m
    sidecar.istio.io/proxyMemory: 32Mi
    sidecar.istio.io/proxyCPULimit: 100m
    sidecar.istio.io/proxyMemoryLimit: 128Mi

container:
  port: 8085
  env:
    - name: DATABASE_URL
      value: postgresql+psycopg://user:password@ticket-db:5432/ticket_db
    - name: KAFKA_BOOTSTRAP_SERVERS
      value: kafka.ticketing-messaging.svc.cluster.local:9092
    - name: KAFKA_GROUP_ID
      value: ticket-service
    - name: PAYMENT_APPROVED_TOPIC
      value: payment-approved
    - name: TICKET_ISSUED_TOPIC
      value: ticket-issued
    - name: AWS_REGION
      value: ap-northeast-2
    - name: S3_BUCKET
      value: ticketing-tickets
    - name: AWS_ACCESS_KEY_ID
      value: ""
    - name: AWS_SECRET_ACCESS_KEY
      value: ""

service:
  port: 8085
  targetPort: http

ingress:
  enabled: true
  className: kong
  objects:
    - name: ticket-customer-api
      annotations:
        konghq.com/plugins: ticketing-jwt,ticketing-identity-headers,ticketing-role-customer,ticketing-rate-limit-tickets,ticketing-correlation-id,ticketing-prometheus
      hosts:
        - host: ""
          paths:
            - path: /tickets
              pathType: Prefix
    - name: ticket-debug-api
      annotations:
        konghq.com/plugins: ticketing-correlation-id,ticketing-prometheus
      hosts:
        - host: ""
          paths:
            - path: /__debug/ticket/status
              pathType: Prefix

networkPolicy:
  enabled: true
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kong
      ports:
        - protocol: TCP
          port: 8085
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: ticket-db
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ticketing-messaging
          podSelector:
            matchLabels:
              app.kubernetes.io/name: kafka
      ports:
        - protocol: TCP
          port: 9092
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
          podSelector:
            matchLabels:
              app.kubernetes.io/name: opentelemetry-collector
      ports:
        - protocol: TCP
          port: 4317
        - protocol: TCP
          port: 4318
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
          podSelector:
            matchLabels:
              app: istiod
      ports:
        - protocol: TCP
          port: 15012
        - protocol: TCP
          port: 15010
        - protocol: TCP
          port: 443
nodeSelector:
  role: app
