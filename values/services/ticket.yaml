app:
  name: ticket-service
  namespace: ticketing-ticket
  labels:
    ticketing.io/service: ticket
    ticketing.io/tier: api

image:
  repository: ticket-service
  tag: 032adcd247def6ef90b814819bfacbae41d06289

deployment:
  replicas: 1
  podLabels:
    sidecar.istio.io/inject: "true"
  podAnnotations:
    sidecar.istio.io/inject: "true"
    sidecar.istio.io/proxyCPU: 5m
    sidecar.istio.io/proxyMemory: 32Mi
    sidecar.istio.io/proxyCPULimit: 100m
    sidecar.istio.io/proxyMemoryLimit: 128Mi

container:
  port: 8085
  resources:
    requests:
      cpu: 25m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  env:
    - name: DATABASE_URL
      value: postgresql+psycopg://user:password@ticket-db:5432/ticket_db
    - name: KAFKA_BOOTSTRAP_SERVERS
      value: kafka.ticketing-messaging.svc.cluster.local:9092
    - name: KAFKA_GROUP_ID
      value: ticket-service
    - name: PAYMENT_APPROVED_TOPIC
      value: payment-approved
    - name: TICKET_ISSUED_TOPIC
      value: ticket-issued
    - name: AWS_REGION
      value: ap-northeast-2
    - name: S3_BUCKET
      value: ticketing-tickets
    - name: AWS_ACCESS_KEY_ID
      value: ""
    - name: AWS_SECRET_ACCESS_KEY
      value: ""

service:
  port: 8085
  targetPort: http

ingress:
  enabled: true
  className: kong
  objects:
    - name: ticket-customer-api
      annotations:
        konghq.com/plugins: ticketing-jwt,ticketing-identity-headers,ticketing-role-customer,ticketing-rate-limit-tickets,ticketing-correlation-id,ticketing-prometheus
      hosts:
        - host: ""
          paths:
            - path: /tickets
              pathType: Prefix
    - name: ticket-debug-api
      annotations:
        konghq.com/plugins: ticketing-correlation-id,ticketing-prometheus
      hosts:
        - host: ""
          paths:
            - path: /__debug/ticket/status
              pathType: Prefix

networkPolicy:
  enabled: true
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kong
      ports:
        - protocol: TCP
          port: 8085
hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70
