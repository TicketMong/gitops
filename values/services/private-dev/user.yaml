container:
  env:
    - name: DATABASE_URL
      valueFrom:
        secretKeyRef:
          name: postgres-user-credentials
          key: database-url
    - name: USER_SIGNING_PRIVATE_KEY
      valueFrom:
        secretKeyRef:
          name: user-service-runtime-secrets
          key: user-signing-private-key
    - name: USER_SIGNING_KEY_ID
      valueFrom:
        secretKeyRef:
          name: user-service-runtime-secrets
          key: user-signing-key-id
    - name: AUTH_PROOF_PUBLIC_KEY
      valueFrom:
        secretKeyRef:
          name: user-service-runtime-secrets
          key: auth-proof-public-key
    - name: AUTH_PROOF_KEY_ID
      valueFrom:
        secretKeyRef:
          name: user-service-runtime-secrets
          key: auth-proof-key-id
    - name: MEDIA_PROOF_PUBLIC_KEY
      valueFrom:
        secretKeyRef:
          name: user-service-runtime-secrets
          key: media-proof-public-key
    - name: MEDIA_PROOF_KEY_ID
      valueFrom:
        secretKeyRef:
          name: user-service-runtime-secrets
          key: media-proof-key-id
    - name: USER_PRIVATE_NAME_ENCRYPTION_KEY
      valueFrom:
        secretKeyRef:
          name: user-service-runtime-secrets
          key: private-name-encryption-key
    - name: USER_ALLOWED_ORIGINS
      valueFrom:
        secretKeyRef:
          name: user-service-runtime-secrets
          key: allowed-origins
    - name: USER_DEVELOPMENT_ENABLED
      value: "false"
