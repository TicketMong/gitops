container:
  env:
    - name: DATABASE_URL
      valueFrom:
        secretKeyRef:
          name: postgres-ticket-credentials
          key: database-url
    - name: KAFKA_BOOTSTRAP_SERVERS
      value: kafka.ticketing-messaging.svc.cluster.local:9092
    - name: KAFKA_GROUP_ID
      value: ticket-service
    - name: PAYMENT_APPROVED_TOPIC
      value: payment-approved
    - name: TICKET_ISSUED_TOPIC
      value: ticket-issued
    - name: AWS_REGION
      value: ap-northeast-2
    - name: S3_BUCKET
      value: ticketing-tickets
    - name: AWS_ACCESS_KEY_ID
      value: ""
    - name: AWS_SECRET_ACCESS_KEY
      value: ""
