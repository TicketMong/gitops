app:
  name: backoffice-service
  namespace: ticketing-backoffice
  labels:
    dropmong.io/service: backoffice
    dropmong.io/tier: api

image:
  repository: backoffice-service
  tag: dev

deployment:
  replicas: 1

container:
  port: 8080
  readinessProbe:
    httpGet:
      path: /readyz
      port: http
    initialDelaySeconds: 3
    periodSeconds: 5
  livenessProbe:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  env:
    - name: DATABASE_URL
      value: postgres://user:password@backoffice-db:5432/backoffice_service?sslmode=disable
    - name: COUPON_SERVICE_URL
      value: http://coupon-service.ticketing-coupon.svc.cluster.local:8080

service:
  port: 8080
  targetPort: http

ingress:
  enabled: true
  className: kong
  objects:
    - name: backoffice-api
      annotations:
        konghq.com/plugins: ticketing-correlation-id,ticketing-prometheus
      hosts:
        - host: ""
          paths:
            - path: /admin
              pathType: Prefix

networkPolicy:
  enabled: false
