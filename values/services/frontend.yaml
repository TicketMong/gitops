app:
  name: frontend
  namespace: ticketing-dashboard
  labels:
    ticketing.io/service: frontend
    ticketing.io/tier: frontend
image:
  repository: frontend
  tag: v0.2.4
deployment:
  replicas: 1
container:
  port: 80
  securityContext:
    runAsNonRoot: true
service:
  port: 80
  targetPort: http
ingress:
  enabled: true
  name: frontend
  className: kong
  annotations:
    conghq.com/plugins: ticketing-correlation-id,ticketing-prometheus
  hosts:
    - host: ""
      paths:
        - path: /
          pathType: Prefix
networkPolicy:
  enabled: true
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kong
      ports:
        - protocol: TCP
          port: 80
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
