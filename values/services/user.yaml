app:
  name: user-service
  namespace: ticketing-user
  labels:
    dropmong.io/service: user
    dropmong.io/tier: api

image:
  repository: user-service
  tag: dev

deployment:
  replicas: 1

container:
  port: 8080
  ports:
    - name: http
      containerPort: 8080
      protocol: TCP
    - name: admin
      containerPort: 9090
      protocol: TCP
  env:
    - name: DATABASE_URL
      valueFrom:
        secretKeyRef:
          name: postgres-user-credentials
          key: database-url
    - name: USER_DEVELOPMENT_ENABLED
      value: "false"
  readinessProbe:
    httpGet:
      path: /readyz
      port: admin
    initialDelaySeconds: 3
    periodSeconds: 5
  livenessProbe:
    httpGet:
      path: /healthz
      port: admin
    initialDelaySeconds: 10
    periodSeconds: 10
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

database:
  sqlalchemy:
    enabled: false

migration:
  enabled: true
  command:
    - /app/migrate
  env:
    - name: DATABASE_URL
      valueFrom:
        secretKeyRef:
          name: postgres-user-credentials
          key: database-url
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

service:
  port: 8080
  targetPort: http
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
    - name: admin
      port: 9090
      targetPort: admin
      protocol: TCP

ingress:
  enabled: true
  className: kong
  objects:
    - name: user-registration-api
      annotations:
        konghq.com/plugins: ticketing-correlation-id,ticketing-prometheus,ticketing-user-trusted-header-sanitizer
        konghq.com/strip-path: "false"
      hosts:
        - host: ""
          paths:
            - path: /api/v1/users
              pathType: Exact
    - name: user-self-api
      annotations:
        konghq.com/plugins: ticketing-correlation-id,ticketing-prometheus,ticketing-user-trusted-header-sanitizer,ticketing-jwt,ticketing-user-principal
        konghq.com/strip-path: "false"
      hosts:
        - host: ""
          paths:
            - path: /api/v1/users/me
              pathType: Prefix

# 운영자 경로는 외부에 공개하지 않는다. Auth가 strong 인증 수준, Session ID,
# canonical permission과 CSRF 검증 결과를 신뢰 가능한 계약으로 제공한 뒤 별도 Ingress를 추가한다.

networkPolicy:
  enabled: true
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kong
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: user-db
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
          podSelector:
            matchLabels:
              app.kubernetes.io/name: opentelemetry-collector
      ports:
        - protocol: TCP
          port: 4317

observability:
  tracing:
    pythonFastAPIExcludedUrlsEnabled: false
  profiling:
    serverAddress: http://pyroscope.observability.svc.cluster.local:4040

serviceMonitor:
  port: admin
  path: /metrics
  networkPolicy:
    port: 9090
    extraPorts: []
