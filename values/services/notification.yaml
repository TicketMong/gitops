app:
  name: notification-service
  namespace: ticketing-notification
  labels:
    ticketing.io/service: notification
    ticketing.io/tier: api

image:
  repository: notification-service
  tag: d779477902afa60e2eec3ba985c0b17b6a680748

deployment:
  replicas: 2

container:
  port: 8084
  env:
    - name: MONGODB_URL
      value: mongodb://notification-db:27017
    - name: MONGODB_DB_NAME
      value: notification_db
    - name: KAFKA_BOOTSTRAP_SERVERS
      value: kafka.ticketing-messaging.svc.cluster.local:9092
    - name: KAFKA_GROUP_ID
      value: notification-service
    - name: RESERVATION_CREATED_TOPIC
      value: reservation-created
    - name: RESERVATION_EXPIRED_TOPIC
      value: reservation-expired
    - name: PAYMENT_APPROVED_TOPIC
      value: payment-approved
    - name: PAYMENT_FAILED_TOPIC
      value: payment-failed
    - name: TICKET_ISSUED_TOPIC
      value: ticket-issued

service:
  port: 8084
  targetPort: http

ingress:
  enabled: true
  name: notification-api
  className: kong
  annotations:
    konghq.com/plugins: ticketing-jwt,ticketing-identity-headers,ticketing-rate-limit-notifications,ticketing-correlation-id,ticketing-prometheus
  hosts:
    - host: ""
      paths:
        - path: /notifications
          pathType: Prefix

networkPolicy:
  enabled: true
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kong
      ports:
        - protocol: TCP
          port: 8084
