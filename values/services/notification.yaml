app:
  name: notification-service
  namespace: ticketing-notification
  labels:
    ticketing.io/service: notification
    ticketing.io/tier: api

image:
  repository: notification-service
  tag: v0.2.0

deployment:
  replicas: 1
  podLabels:
    sidecar.istio.io/inject: "true"
  podAnnotations:
    sidecar.istio.io/inject: "true"
    sidecar.istio.io/proxyCPU: 25m
    sidecar.istio.io/proxyMemory: 64Mi
    sidecar.istio.io/proxyCPULimit: 200m
    sidecar.istio.io/proxyMemoryLimit: 256Mi

container:
  port: 8084
  env:
    - name: MONGODB_URL
      value: mongodb://notification-db:27017
    - name: MONGODB_DB_NAME
      value: notification_db
    - name: KAFKA_BOOTSTRAP_SERVERS
      value: kafka.ticketing-messaging.svc.cluster.local:9092
    - name: KAFKA_GROUP_ID
      value: notification-service
    - name: RESERVATION_CREATED_TOPIC
      value: reservation-created
    - name: RESERVATION_EXPIRED_TOPIC
      value: reservation-expired
    - name: PAYMENT_APPROVED_TOPIC
      value: payment-approved
    - name: PAYMENT_FAILED_TOPIC
      value: payment-failed
    - name: TICKET_ISSUED_TOPIC
      value: ticket-issued

service:
  port: 8084
  targetPort: http

ingress:
  enabled: true
  className: kong
  objects:
    - name: notification-customer-api
      annotations:
        konghq.com/plugins: ticketing-jwt,ticketing-identity-headers,ticketing-role-customer,ticketing-rate-limit-notifications,ticketing-correlation-id,ticketing-prometheus
      hosts:
        - host: ""
          paths:
            - path: /notifications
              pathType: Prefix
    - name: notification-debug-api
      annotations:
        konghq.com/plugins: ticketing-correlation-id,ticketing-prometheus
      hosts:
        - host: ""
          paths:
            - path: /__debug/notification/status
              pathType: Prefix

networkPolicy:
  enabled: true
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kong
      ports:
        - protocol: TCP
          port: 8084
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: notification-db
      ports:
        - protocol: TCP
          port: 27017
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ticketing-messaging
          podSelector:
            matchLabels:
              app.kubernetes.io/name: kafka
      ports:
        - protocol: TCP
          port: 9092
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
          podSelector:
            matchLabels:
              app.kubernetes.io/name: opentelemetry-collector
      ports:
        - protocol: TCP
          port: 4317
        - protocol: TCP
          port: 4318
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
          podSelector:
            matchLabels:
              app: istiod
      ports:
        - protocol: TCP
          port: 15012
        - protocol: TCP
          port: 15010
        - protocol: TCP
          port: 443
nodeSelector:
  role: app
