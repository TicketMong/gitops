app:
  name: reservation-service
  namespace: ticketing-reservation
  labels:
    ticketing.io/service: reservation
    ticketing.io/tier: api

image:
  repository: reservation-service
  tag: 032adcd247def6ef90b814819bfacbae41d06289

deployment:
  replicas: 1
  podLabels:
    version: v1
    sidecar.istio.io/inject: "true"
  podAnnotations:
    sidecar.istio.io/inject: "true"
    sidecar.istio.io/proxyCPU: 25m
    sidecar.istio.io/proxyMemory: 64Mi
    sidecar.istio.io/proxyCPULimit: 200m
    sidecar.istio.io/proxyMemoryLimit: 256Mi

canary:
  enabled: false
  version: v2
  replicas: 1
  podLabels:
    medikong.io/canary: "true"
    sidecar.istio.io/inject: "true"
  podAnnotations:
    sidecar.istio.io/inject: "true"
    sidecar.istio.io/proxyCPU: 25m
    sidecar.istio.io/proxyMemory: 64Mi
    sidecar.istio.io/proxyCPULimit: 200m
    sidecar.istio.io/proxyMemoryLimit: 256Mi

container:
  port: 8083
  env:
    - name: DATABASE_URL
      value: postgresql+psycopg://user:password@reservation-db:5432/reservation_db
    - name: KAFKA_BOOTSTRAP_SERVERS
      value: kafka.ticketing-messaging.svc.cluster.local:9092
    - name: RESERVATION_CREATED_TOPIC
      value: reservation-created
    - name: RESERVATION_EXPIRED_TOPIC
      value: reservation-expired

service:
  port: 8083
  targetPort: http

ingress:
  enabled: true
  className: kong
  objects:
    - name: reservation-customer-api
      annotations:
        konghq.com/plugins: ticketing-jwt,ticketing-identity-headers,ticketing-role-customer,ticketing-rate-limit-reservations,ticketing-correlation-id,ticketing-prometheus
      hosts:
        - host: ""
          paths:
            - path: /reservations
              pathType: Prefix
    - name: reservation-debug-api
      annotations:
        konghq.com/plugins: ticketing-correlation-id,ticketing-prometheus
      hosts:
        - host: ""
          paths:
            - path: /__debug/reservation/status
              pathType: Prefix
    - name: reservation-provider-api
      annotations:
        konghq.com/plugins: ticketing-jwt,ticketing-identity-headers,ticketing-role-provider,ticketing-rate-limit-reservations,ticketing-correlation-id,ticketing-prometheus
        konghq.com/regex-priority: "100"
      hosts:
        - host: ""
          paths:
            - path: /~/provider/concerts/[^/]+/sales$
              pathType: ImplementationSpecific
            - path: /~/provider/showtimes/[^/]+/sales$
              pathType: ImplementationSpecific
    - name: reservation-admin-api
      annotations:
        konghq.com/plugins: ticketing-jwt,ticketing-identity-headers,ticketing-role-admin,ticketing-rate-limit-reservations,ticketing-correlation-id,ticketing-prometheus
        konghq.com/regex-priority: "100"
      hosts:
        - host: ""
          paths:
            - path: /~/admin/concerts/[^/]+/(sales|sales/start|sales/pause|sales/resume|queue-policy|traffic-policy)$
              pathType: ImplementationSpecific

networkPolicy:
  enabled: true
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kong
      ports:
        - protocol: TCP
          port: 8083
hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70
