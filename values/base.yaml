environment: base

deployment:
  replicasManaged: true
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

canary:
  enabled: false
  nameSuffix: v2
  version: v2
  replicas: 1
  image:
    tag: ""
  podLabels: {}
  podAnnotations: {}
  resources: {}

image:
  registry: ""
  repository: zexpand/sample-service
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []

container:
  port: 8080
  ports: []
  env: []
  envFrom: []
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  readinessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10
  livenessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 15
    periodSeconds: 20

database:
  sqlalchemy:
    enabled: true
    poolSize: 15
    maxOverflow: 0
    poolTimeoutSeconds: 15
    poolRecycleSeconds: 1800

podSecurityContext: {}
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  capabilities:
    drop:
      - ALL

nodeSelector: {}
tolerations: []
affinity: {}

serviceAccount:
  create: true
  name: ""
  annotations: {}
  automountServiceAccountToken: false

rbac:
  create: true
  rules: []

service:
  type: ClusterIP
  port: 8080
  targetPort: http
  ports: []
  annotations: {}

migration:
  enabled: false
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    argocd.argoproj.io/sync-wave: "-1"
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
    helm.sh/hook-weight: "-5"
  podAnnotations: {}
  podLabels: {}
  command: []
  args: []
  env: []
  envFrom: []
  backoffLimit: 3
  activeDeadlineSeconds: 600
  ttlSecondsAfterFinished: 3600
  resources: {}

ingress:
  enabled: false
  name: ""
  className: kong
  annotations: {}
  objects: []
  hosts: []

networkPolicy:
  enabled: true
  policyTypes:
    - Ingress
  ingress: []

pdb:
  enabled: false
  minAvailable: 1

hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 60

serviceMonitor:
  enabled: false
  labels:
    release: kube-prometheus-stack
  interval: 30s
  path: /metrics
  port: http
  networkPolicy:
    enabled: true
    namespace: monitoring
    port: null
    extraPorts: []
